{{#> layout}}
<div class="vibe-container map-spatial-page">
	<aside class="map-search-sidebar map-spatial-sidebar is-open" id="spatialPanel">
    <div class="map-search-sidebar__inner">
      <header class="map-search-sidebar__header map-spatial-sidebar__header">
        <h2>경관 분석 &gt; 스카이라인 분석</h2>
        <button type="button" class="map-search-sidebar__close" data-target="spatialPanel" title="닫기">닫기</button>
      </header>

      <div class="map-search-sidebar__body map-spatial-sidebar__body">
        <div class="map-sidebar__notice">
          <div class="map-sidebar__notice-content">
          <strong>스카이라인 분석</strong>
            <p>사용자는 시점설정 후 스카이라인을 확인할 수 있습니다.</p>
          </div>
          <button type="button" class="btn-notice" aria-label="설명 보기">사용법 및 산출방식</button>
        </div>

        <div class="sidebar_divider"></div>

        <section class="map-spatial-sidebar__section">
          <div class="map-spatial-sidebar__radius-box">
            <div class="map-spatial-color-row">
              <span class="map-spatial-color-row__label">색상지정</span>
              <button type="button" class="map-spatial-color-row__swatch" style="background:#a8c5e2;" title="하늘 색상 선택" aria-label="하늘 색상 선택"></button>
              <span class="map-spatial-color-row__label">하늘</span>
              <button type="button" class="map-spatial-color-row__swatch" style="background:#b5a98e;" title="지형 및 건물 색상 선택" aria-label="지형 및 건물 색상 선택"></button>
              <span class="map-spatial-color-row__label">지형 및 건물</span>
            </div>
            <div class="map-spatial-stepper">
              <span class="map-spatial-stepper__label">카메라 절대고도</span>
              <div class="map-spatial-stepper__control">
                <input type="number" class="map-spatial-stepper__input" value="10" min="0" aria-label="카메라 절대고도">
                <span class="map-spatial-stepper__unit">m</span>
                <button type="button" class="map-spatial-stepper__btn" aria-label="증가">+</button>
                <button type="button" class="map-spatial-stepper__btn" aria-label="감소">-</button>
              </div>
            </div>
          </div>
        </section>

        <div class="sidebar__footer">
          <button type="button" class="sidebar__footer-btn">초기화</button>
          <button type="button" class="sidebar__footer-btn">시점설정</button>
          <button type="button" class="sidebar__footer-btn sidebar__footer-btn--primary">분석실행</button>
        </div>
      </div>
    </div>
    <button type="button" class="map-search-sidebar__open" data-target="spatialPanel">열기</button>
  </aside>

	<div class="map-area">
		<div id="map-container"></div>
		{{> map-toolbar}}
	</div>

</div>
{{/layout}}
