{{#> layout3}}

<div class="cont-box-wrap access-status-wrap">
  <div class="cont-box access-status">
    <div class="tit-wrap">
      <h2>접속 현황 통계</h2>
    </div>

    <div class="access-status__search">
      <div class="access-status__search-form">
        <label for="accessUnitDaily" class="access-status__label">통계 단위</label>
        <fieldset class="ra-group access-status__ra-group">
          <legend>통계 단위</legend>
          <div class="ra-list">
            <div class="ra-item">
              <input type="radio" id="accessUnitDaily" name="accessUnit" checked>
              <label for="accessUnitDaily">일</label>
            </div>
            <div class="ra-item">
              <input type="radio" id="accessUnitWeekly" name="accessUnit">
              <label for="accessUnitWeekly">주</label>
            </div>
            <div class="ra-item">
              <input type="radio" id="accessUnitMonthly" name="accessUnit">
              <label for="accessUnitMonthly">월</label>
            </div>
            <div class="ra-item">
              <input type="radio" id="accessUnitQuarterly" name="accessUnit">
              <label for="accessUnitQuarterly">분기</label>
            </div>
            <div class="ra-item">
              <input type="radio" id="accessUnitYearly" name="accessUnit">
              <label for="accessUnitYearly">연도</label>
            </div>
          </div>
        </fieldset>

        <label for="accessStatusFromDate" class="access-status__label">기간</label>
        <div class="access-status__period">
          <input type="date" id="accessStatusFromDate" class="type01" value="2026-01-09">
          <span class="access-status__dash">~</span>
          <input type="date" id="accessStatusToDate" class="type01" value="2026-02-08">
        </div>

        <button type="button" class="com-btn access-status__btn-search">검색</button>
      </div>
    </div>

    <div class="access-status__chart-card">
      <div class="access-status__chart"><div class="access-status__chart-inner"></div></div>
    </div>
  </div>
</div>

{{/layout3}}
