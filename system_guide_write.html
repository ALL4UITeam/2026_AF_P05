{{#> layout3}}

<div class="cont-box-wrap">
  <div class="cont-box write-form">
    <div class="tit-wrap">
      <h2>사용자 가이드 등록</h2>
    </div>
    <p class="write-form__guide">사용자 가이드는 제목, 요약, 상세 내용을 입력해 단계별로 작성해 주세요.</p>

    <div class="tbl-wrap write-form__table">
      <table class="tbl">
        <colgroup>
          <col style="width:180px;">
          <col style="width:auto;">
        </colgroup>
        <tbody>
          <tr>
            <th>제목</th>
            <td><input type="text" class="type01" placeholder="제목을 입력하세요."></td>
          </tr>
          <tr>
            <th>카테고리</th>
            <td>
              <select class="type01">
                <option>입문</option>
                <option>지도 서비스</option>
                <option>권한/정책</option>
                <option>다운로드</option>
              </select>
            </td>
          </tr>
          <tr>
            <th>요약 설명</th>
            <td><input type="text" class="type01" placeholder="요약 설명을 입력하세요."></td>
          </tr>
          <tr>
            <th>상세 내용</th>
            <td><textarea class="type01" placeholder="상세 내용을 입력하세요."></textarea></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="form-wrap write-form__actions">
      <a href="/system_guide_list.html" class="com-btn blue w200">목록</a>
      <button type="button" class="com-btn blue w200">저장</button>
    </div>
  </div>
</div>

{{/layout3}}
