{{#> layout}}
<div class="vibe-container map-spatial-page">
  <aside class="map-search-sidebar map-spatial-sidebar is-open" id="spatialPanel">
    <div class="map-search-sidebar__inner">
      <header class="map-search-sidebar__header map-spatial-sidebar__header">
        <h2>경관 분석 &gt; 가시권 분석</h2>
        <button type="button" class="map-search-sidebar__close" data-target="spatialPanel" title="닫기">닫기</button>
      </header>

      <div class="map-search-sidebar__body map-spatial-sidebar__body">
        <div class="map-sidebar__notice">
          <div class="map-sidebar__notice-content">
            <strong>가시권</strong>
            <p>분석 인자(지점, 퍼짐각, 정밀도)를 통한 총면적, 가시면적, 비가시면적을 추출합니다.</p>
          </div>
          <button type="button" class="btn-notice" aria-label="설명 보기">사용법 및 산출방식</button>
        </div>
        <div class="sidebar_divider"></div>

        <div class="map-sidebar__content">
          <section class="map-sidebar__section">
            <div class="map-section-card">
              <div class="map-section-card__header">
                <h3>분석 인자</h3>
                <button type="button" class="map-ui-btn btn-reset">초기화</button>
              </div>
              <div class="map-section-card__group">
                <div class="map-card__row">
                  <span class="map-card__row-label">퍼짐각</span>
                  <div class="map-card__length">
                    <input type="number" class="map-ui-input" value="40" min="0" max="360" aria-label="퍼짐각">
                    <span class="map-card__unit">&deg; (deg)</span>
                  </div>
                </div>
                <div class="map-card__row">
                  <span class="map-card__row-label">정밀도</span>
                  <div class="map-card__length">
                    <input type="numbe  r" class="map-ui-input" value="1" min="1" max="10" aria-label="정밀도">
                    <span class="map-card__unit">&deg; (deg)</span>
                  </div>
                </div>

                <div class="map-visibility__colors">
                  <div class="map-card__color-item map-card__color-item--vis">
                    <span>가시색상</span>
                  </div>
                  <div class="map-card__color-item map-card__color-item--hid">
                    <span>비가시색상</span>
                  </div>
                </div>
              </div>
            </div>
          </section>
          <div class="sidebar_divider"></div>
          <section class="map-sidebar__section">
            <div class="map-section-card">
              <div class="map-section-card__header">
                <h3 class="blue-title">기준점</h3>
                <span class="map-card__height">높이: 10.1(m)</span>
              </div>
              <div class="map-section-card__group">
                <div class="map-card__row">
                  <span class="map-card__row-label">x축 이동</span>
                  <div class="map-card__stepper">
                    <input type="number" class="map-ui-input" value="0.5" min="0" max="10" aria-label="x축 이동">
                    <span class="map-card__unit">m</span>
                    <button type="button" class="map-ui-btn--minus" aria-label="감소"></button>
                    <button type="button" class="map-ui-btn--plus" aria-label="증가"></button>
                  </div>
                </div>
                <div class="map-card__row">
                  <span class="map-card__row-label">y축 이동</span>
                  <div class="map-card__stepper">
                    <input type="number" class="map-ui-input" value="0.5" min="0" max="10" aria-label="y축 이동">
                    <span class="map-card__unit">m</span>
                    <button type="button" class="map-ui-btn--minus" aria-label="감소"></button>
                    <button type="button" class="map-ui-btn--plus" aria-label="증가"></button>
                  </div>
                </div>
                <div class="map-card__row">
                  <span class="map-card__row-label">z축 이동</span>
                  <div class="map-card__stepper">
                    <input type="number" class="map-ui-input" value="0.5" min="0" max="10" aria-label="z축 이동">
                    <span class="map-card__unit">m</span>
                    <button type="button" class="map-ui-btn--minus" aria-label="감소"></button>
                    <button type="button" class="map-ui-btn--plus" aria-label="증가"></button>
                  </div>
                </div>
              </div>
            </div>

            
          </section>
          <div class="sidebar_divider"></div>
          <section class="map-sidebar__section">
            <div class="map-section-card">
              <div class="map-section-card__header">
                <h3 class="blue-title">방향점</h3>
                <span class="map-card__height">높이: 10.1(m)</span>
              </div>
              <div class="map-section-card__group">
                <div class="map-card__row">
                  <span class="map-card__row-label">x축 이동</span>
                  <div class="map-card__stepper">
                    <input type="number" class="map-ui-input" value="0.5" min="0" max="10" aria-label="x축 이동">
                    <span class="map-card__unit">m</span>
                    <button type="button" class="map-ui-btn--minus" aria-label="감소"></button>
                    <button type="button" class="map-ui-btn--plus" aria-label="증가"></button>
                  </div>
                </div>
                <div class="map-card__row">
                  <span class="map-card__row-label">y축 이동</span>
                  <div class="map-card__stepper">
                    <input type="number" class="map-ui-input" value="0.5" min="0" max="10" aria-label="y축 이동">
                    <span class="map-card__unit">m</span>
                    <button type="button" class="map-ui-btn--minus" aria-label="감소"></button>
                    <button type="button" class="map-ui-btn--plus" aria-label="증가"></button>
                  </div>
                </div>
                <div class="map-card__row">
                  <span class="map-card__row-label">z축 이동</span>
                  <div class="map-card__stepper">
                    <input type="number" class="map-ui-input" value="0.5" min="0" max="10" aria-label="z축 이동">
                    <span class="map-card__unit">m</span>
                    <button type="button" class="map-ui-btn--minus" aria-label="감소"></button>
                    <button type="button" class="map-ui-btn--plus" aria-label="증가"></button>
                  </div>
                </div>
              </div>
            </div>

            
          </section>
        </div>


        <div class="sidebar__footer">
          <button type="button" class="sidebar__footer-btn">지점선택</button>
          <button type="button" class="sidebar__footer-btn sidebar__footer-btn--primary">분석실행</button>
        </div>
      </div>


    </div>
    <button type="button" class="map-search-sidebar__open" data-target="spatialPanel">열기</button>
  </aside>

  <div class="map-area">
    <div id="map-container"></div>
    {{> map-toolbar}}
  </div>

</div>
{{/layout}}
