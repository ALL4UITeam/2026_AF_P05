<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/gb_intelligent.css">
<script src="js/bootstrap.min.js"></script>
<script src="js/lib/jquery-3.7.1.js"></script>
<script src="js/ui.js"></script>
<title>경북 지능공간정보 플랫폼</title>
<style>
	
	body{background:#F0F6FF; overflow-y:auto;}
	.registerWrap{width:100%; min-height:100vh; background:rgb(34, 34, 34, 0.8); color:#000; display:flex;  align-items:start; justify-content:center;}
	.listBoxWrap header h3{margin-bottom:20px; font-size:20px; letter-spacing:-.5px; text-align:center; font-weight:bold;}
	.listBoxWrap{width:100%; padding:20px 0 40px}
	.listBox{width:100%; height:100%; margin:0 auto; padding:0 20px;}
	.bg{position:absolute; width:100vh; height:100vh; background:rgb(34, 34, 34, 0.8);}
	.info{background:#fff; padding:15px; border:1px dashed #2A61BA; color:#000; margin-bottom:10px; font-weight:700;}
	.info p{color:#333;}
	/* Table */
	.tableStyle {margin:0 auto; width:100%; border-top:1px solid #313131;}
	.tableStyle thead th {padding:8px; background:#eee; border-bottom:1px solid #a7a7a7; text-align:center;color:#000000; font-size:14px;}
	.tableStyle tbody td {padding:4px; background:#fff; border-bottom:1px solid #dcdcdc; text-align:center;color:#000000; font-size:14px; line-height:24px; word-break:break-all;}
	.tableStyle tbody td.al{text-align:left;}
	.tableStyle tbody td a:hover{text-decoration:underline; color:#000;}

	span.work{display:inline-block; width:40px; padding:3px; background:#cfcfcf; border-radius:3px; font-size:12px; color:#fff}
	span.work.on{background:#2A61BA;}
	span.work.modify{background:#ed495d;}
	span.work.ing{background:#1cc49a;}
	span.work.del{background:#6e1bf3;}
</style>
<script>
	function updateRowNumbers(){
		var $pgNum = $('table td.pgNum');
		var number = 1;
		$pgNum.each(function(){
			$(this).text(number);
			number = number+1;
		});
	}

	function appendPageRow($tbody, page){
		$tbody.append(
			'<tr><td class="pgNum tCenter"></td>' +
			'<td class="al">' + (page.title || page.file) + '</td>' +
			'<td class="al"><a href="' + page.file + '" target="_blank" title="새창열림" class="page-link">' + page.file + '</a></td>' +
			'<td>' + (page.type || '') + '</td>' +
			'<td class="tCenter"><span class="work on">완료</span></td>' +
			'<td class="al">' + (page.note || '') + '</td></tr>'
		);
	}
	$(function(){
		var $tbody = $('#pageListBody');

		// 시스템관리 페이지 고정 목록
		var systemPages = [
			{ file: 'communication_notice.html', title: '소통공간 공지사항', type: 'commu' },
			{ file: 'communication.html', title: '소통공간 FAQ(아코디언)', type: 'commu' },
			{ file: 'communication_qna.html', title: '소통공간 질의응답', type: 'commu' },
			{ file: 'communication_guide.html', title: '소통공간 사용자 가이드', type: 'commu' },
			{ file: 'communication_guide_view.html', title: '소통공간 가이드 상세', type: 'commu' },
			{ file: 'communication-2.html', title: '소통공간 공지 상세', type: 'commu' },
			{ file: 'system.html', title: '시스템관리 메인', type: 'system' },
			{ file: 'system_notice_list.html', title: '공지사항 리스트', type: 'system' },
			{ file: 'system_notice_view.html', title: '공지사항 상세', type: 'system' },
			{ file: 'system_notice_write.html', title: '공지사항 등록', type: 'system' },
			{ file: 'system_faq_list.html', title: '자주하는 질문 리스트', type: 'system' },
			{ file: 'system_faq_view.html', title: '자주하는 질문 상세', type: 'system' },
			{ file: 'system_faq_write.html', title: '자주하는 질문 등록', type: 'system' },
			{ file: 'system_qna_list.html', title: '질의응답 리스트', type: 'system' },
			{ file: 'system_qna_view.html', title: '질의응답 상세', type: 'system' },
			{ file: 'system_qna_write.html', title: '질의응답 등록', type: 'system' },
			{ file: 'system_guide_list.html', title: '사용자 가이드 리스트', type: 'system' },
			{ file: 'system_guide_view.html', title: '사용자 가이드 상세', type: 'system' },
			{ file: 'system_guide_write.html', title: '사용자 가이드 등록', type: 'system' },
			{ file: 'system_code_manage.html', title: '코드 관리', type: 'system' },
			{ file: 'system_access_history.html', title: '접속 이력 조회', type: 'system' },
			{ file: 'system_access_status.html', title: '접속 현황 통계', type: 'system' },
			{ file: 'system_use_status.html', title: '이용 현황 통계', type: 'system' },
			{ file: 'system_use_history.html', title: '사용 이력 조회', type: 'system' },
			{ file: 'system_use_approval.html', title: '사용 승인 관리', type: 'system' },
			{ file: 'system_permission_approval.html', title: '권한 승인 요청 관리', type: 'system' },
			{ file: 'system_data_request.html', title: '자료 제공 요청 관리', type: 'system' },
			{ file: 'system_user_group_manage.html', title: '사용자 그룹 관리', type: 'system' },
			{ file: 'system_terms_manage.html', title: '사용 약관 관리', type: 'system' },
			{ file: 'system_terms_write.html', title: '사용 약관 등록', type: 'system' },
			{ file: 'map-search.html', title: '검색', type: 'map' },
			{ file: 'map-search-2.html', title: '검색', type: 'map' },
			{ file: 'map-search-3.html', title: '검색', type: 'map' },
			{ file: 'map-search-4.html', title: '검색', type: 'map' },
			{ file: 'map-integration-1.html', title: '통합지도', type: 'map' },
			{ file: 'map-integration-2.html', title: '통합지도', type: 'map' },
			{ file: 'map-mydata-1.html', title: '마이데이터', type: 'map' },
			{ file: 'map-mydata-2.html', title: '마이데이터', type: 'map' },
			{ file: 'map-mydata-3.html', title: '마이데이터', type: 'map' },
			{ file: 'map-mydata-4.html', title: '마이데이터', type: 'map' },
			{ file: 'map-mydata-5.html', title: '마이데이터', type: 'map' },
			{ file: 'map-mydata-6.html', title: '마이데이터', type: 'map' },
			{ file: 'toc-manage.html', title: 'TOC 관리 (레이어 검색·TOC)', type: 'toc' },
			{ file: 'toc-saved-list.html', title: 'TOC 저장된 목록', type: 'toc' },
			{ file: 'toc-style-setting.html', title: 'TOC 스타일 설정', type: 'toc' },
			{ file: 'spatial_data_dashboard.html', title: '공간 데이터 대시보드', type: 'data' },
			{ file: 'spatial_data_manage.html', title: '공간데이터 관리', type: 'data' },
			{ file: 'system_security_pledge_manage.html', title: '보안각서 관리', type: 'system', note: '양식관리 탭(리스트) + 양식 등록/수정 모달 포함' },
			{ file: 'system_security_pledge_detail.html', title: '보안 서약서 상세', type: 'system', note: '인쇄/워터마크 포함' },
			{ file: 'public/admin_sso_link.html', title: 'SSO 연계', type: 'admin' }
		];

		$.each(systemPages, function(i, page){
			appendPageRow($tbody, page);
		});
		updateRowNumbers();

		// 생성된 map 페이지 목록 자동 추가 (public/map-pages.json)
		$.getJSON('map-pages.json')
			.done(function(pages){
				$.each(pages, function(i, p){
					appendPageRow($tbody, {
						file: p.file,
						title: p.title,
						type: 'map'
					});
				});
				updateRowNumbers();
			})
			.fail(function(){ console.warn('map-pages.json을 불러올 수 없습니다. (로컬 서버에서 실행 시 정상 동작)'); });
	});
</script>
</head>
<body>
	<div class="loginWrap">
		<div style="height:100vh;">
			<!-- list -->
			<div class="listBoxWrap">
				<header>
					<h3>경북 지능공간정보 플랫폼 퍼블리싱 List</h3>
				</header>

				<div class="listBox">
					<div class="info">
						<p>* 레이어팝업은 해당 관련페이지 <span style="color:red">하단에 주석처리 </span> 되었으며, 리스트에 있는 팝업(popupSample.html)은 preview 하기위한 예시파일입니다.</p>
					</div>

					<table class="tableStyle">
						<caption></caption>
						<colgroup>
							<col width="6%" />
							<col width="25%" />
							<col width="22%" />
							<col width="8%" />
							<col width="10%" />
							<col width="" />
						</colgroup>
						<thead>
							<tr>
								<th scope="col">No.</th>
								<th scope="col">파일</th>
								<th scope="col">파일링크</th>
								<th scope="col">유형</th>
								<th scope="col">완료여부</th>
								<th scope="col">비고</th>
							</tr>
						</thead>
						<tbody id="pageListBody">
						</tbody>
					</table>
				</div>
			</div>
			<!-- lizst -->
		</div>
	</div>

</body>
</html>
