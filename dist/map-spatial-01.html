<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="/css/gb_Intelligent.css">
	<link rel="stylesheet" href="/css/select2.min.css">
	<script src="/js/lib/jquery-3.7.1.js"></script>
	<script src="/js/lib/select2.min.js"></script>
	<script src="/js/ui.js"></script>
	<title>경북 지능공간정보 플랫폼</title>
  <script type="module" crossorigin src="/js/modulepreload-polyfill.js"></script>
  <script type="module" crossorigin src="/js/main.js"></script>
  <link rel="stylesheet" crossorigin href="/css/main.css">
</head>

<body>
	<div class="all-wrap">
		<!-- header -->
		<header>
			<div class="top-menu-wrap">
				<div class="logo-area">
					<a href="#" class="home"></a>
					<a href="#" class="logo"></a> <span>지능공간정보 플랫폼</span>
				</div>

				<div class="top-menu">

					<a href="#" class="intelli active">지능공간정보</a>
					<a href="#" class="property">도유재산</a>
					<a href="#" class="land">토지정보</a>
					

					<div class="popover-menu-wrap intelli active">
						<div class="tab-menu">
							<ul>
								<li><a href="#" class="active">통합지도</a></li>
								<li><a href="#">3D지도</a></li>
								<li><a href="#">실내지도</a></li>
								<li><a href="#">주제도</a></li>
								<li><a href="#">검색</a></li>
								<li><a href="#">분석</a></li>
								<li><a href="#">통계지도</a></li>
								<li><a href="#">마이 데이터</a></li>
								<li><a href="#">입지분석 시뮬레이션</a></li>
							</ul>
						</div>
					</div>

				</div>

				<div class="login-info">
					<p>경상북도청</p>
					<p class="name">홍길동 님</p>
				</div>
			</div>
		</header>
		<!-- header -->

		<!-- content -->
		<div class="content-wrap">
			<div class="content">
				<div class="vibe-container map-spatial-page">
					<aside class="map-search-sidebar map-spatial-sidebar is-open" id="spatialPanel">
					  <div class="map-search-sidebar__inner">
					    <header class="map-search-sidebar__header map-spatial-sidebar__header">
					      <h2>공간분석</h2>
					      <button type="button" class="map-search-sidebar__close" data-target="spatialPanel" title="닫기">닫기</button>
					    </header>
					
					    <div class="map-search-sidebar__body map-spatial-sidebar__body">
					      <p class="map-spatial-sidebar__notice">
					        <i aria-hidden="true">i</i>
					        <span>영향권 분석에 대한 설명을 확인하고, 기준점과 거리를 설정해 분석을 실행하세요.</span>
					      </p>
					
					      <section class="map-spatial-sidebar__section">
					        <h3 class="map-spatial-sidebar__title">기준점 설정</h3>
					        <button type="button" class="map-spatial-sidebar__anchor-btn">
					          지도에서 건물을 선택하세요
					        </button>
					      </section>
					
					      <section class="map-spatial-sidebar__section">
					        <h3 class="map-spatial-sidebar__title">버퍼 거리 설정</h3>
					        <div class="map-spatial-sidebar__radius-box">
					          <div class="map-spatial-sidebar__radius-row">
					            <label for="spatialZone1Range" class="map-spatial-sidebar__zone-label is-active">
					              <span class="dot"></span>Zone 1
					            </label>
					            <div class="map-spatial-sidebar__distance-input">
					              <input id="spatialZone1Input" type="number" class="map-ui-input" value="50" min="0" title="Zone 1 거리" aria-label="Zone 1 거리">
					              <span>m</span>
					            </div>
					          </div>
					          <input id="spatialZone1Range" type="range" class="mydata-layer__range" min="0" max="500" value="50">
					
					          <div class="map-spatial-sidebar__radius-row is-disabled">
					            <label for="spatialZone2Range" class="map-spatial-sidebar__zone-label">
					              <span class="dot"></span>Zone 2
					            </label>
					            <div class="map-spatial-sidebar__distance-input">
					              <input id="spatialZone2Input" type="number" class="map-ui-input" value="50" min="0" title="Zone 2 거리" aria-label="Zone 2 거리" disabled>
					              <span>m</span>
					            </div>
					          </div>
					          <input id="spatialZone2Range" type="range" class="mydata-layer__range" min="0" max="500" value="50" disabled>
					
					          <button type="button" class="map-spatial-sidebar__add-zone">+ 반경 추가</button>
					        </div>
					      </section>
					
					      <section class="map-spatial-sidebar__section">
					        <h3 class="map-spatial-sidebar__title">분석 대상</h3>
					        <div class="map-spatial-sidebar__target-grid">
					          <div class="map-spatial-sidebar__target">
					            <label class="input-check">
					              <input type="checkbox">
					              <span class="input-check__ui"></span>
					              <span class="input-check__label">건물</span>
					            </label>
					          </div>
					          <div class="map-spatial-sidebar__target">
					            <label class="input-check">
					              <input type="checkbox" checked>
					              <span class="input-check__ui"></span>
					              <span class="input-check__label">도로</span>
					            </label>
					          </div>
					          <div class="map-spatial-sidebar__target">
					            <label class="input-check">
					              <input type="checkbox" checked>
					              <span class="input-check__ui"></span>
					              <span class="input-check__label">가로수</span>
					            </label>
					          </div>
					          <div class="map-spatial-sidebar__target">
					            <label class="input-check">
					              <input type="checkbox" checked>
					              <span class="input-check__ui"></span>
					              <span class="input-check__label">소화전</span>
					            </label>
					          </div>
					          <div class="map-spatial-sidebar__target">
					            <label class="input-check">
					              <input type="checkbox" checked>
					              <span class="input-check__ui"></span>
					              <span class="input-check__label">CCTV</span>
					            </label>
					          </div>
					          <div class="map-spatial-sidebar__target">
					            <label class="input-check">
					              <input type="checkbox" checked>
					              <span class="input-check__ui"></span>
					              <span class="input-check__label">인구</span>
					            </label>
					          </div>
					        </div>
					      </section>
					
					      <div class="sidebar__footer">
					        <button type="button" class="sidebar__footer-btn sidebar__footer-btn--primary">실행 (Run)</button>
					      </div>
					    </div>
					  </div>
					
					  <button type="button" class="map-search-sidebar__open" data-target="spatialPanel">열기</button>
					</aside>
					<div class="map-area">
						<div id="map-container"></div>
						
						<div class="map-toolbar-wrap">
							<button type="button" class="map-toolbar__btn" data-tool="theme">
								<span class="map-toolbar__label">주제도</span>
							</button>
							
							<div class="map-toolbar" aria-label="지도 도구">
								<button type="button" class="map-toolbar__btn" data-tool="basemap">
									<span class="map-toolbar__label">3D</span>
								</button>
								
								<button type="button" class="map-toolbar__btn" data-tool="distance">
									<span class="map-toolbar__label">거리</span>
								</button>
								<button type="button" class="map-toolbar__btn" data-tool="area">
									<span class="map-toolbar__label">면적</span>
								</button>
								<button type="button" class="map-toolbar__btn" data-tool="elevation">
									<span class="map-toolbar__label">표고</span>
								</button>
								<button type="button" class="map-toolbar__btn" data-tool="radius">
									<span class="map-toolbar__label">반경</span>
								</button>
								<button type="button" class="map-toolbar__btn" data-tool="draw">
									<span class="map-toolbar__label">그리기</span>
								</button>
								<button type="button" class="map-toolbar__btn" data-tool="print">
									<span class="map-toolbar__label">인쇄</span>
								</button>
								<button type="button" class="map-toolbar__btn" data-tool="save">
									<span class="map-toolbar__label">저장</span>
								</button>
								<button type="button" class="map-toolbar__btn" data-tool="roadview">
									<span class="map-toolbar__label">로드뷰</span>
								</button>
								<button type="button" class="map-toolbar__btn" data-tool="info">
									<span class="map-toolbar__label">정보보기</span>
								</button>
							</div>
						
							<div class="map-toolbar__btn-wrap">
								<button type="button" class="map-toolbar__btn" data-tool="compass" title="나침반"></button>
							</div>
							<div class="map-toolbar__btn-wrap">
								<button type="button" class="map-toolbar__btn" data-tool="current-location" title="현재위치"></button>
							</div>
							<div class="map-toolbar__btn-wrap">
								<button type="button" class="map-toolbar__btn" data-tool="home" title="홈"></button>
							</div>
							
						</div>	</div>
				</div>
			</div>
		</div>
		<!-- content -->
	</div>

</body>

</html>
