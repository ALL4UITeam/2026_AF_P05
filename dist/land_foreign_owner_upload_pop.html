<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/gb_intelligent.css">
<link href="css/select2.min.css" rel="stylesheet" />
<script src="js/lib/jquery-3.7.1.js"></script>
<script src="js/lib/select2.min.js"></script>
<script src="js/ui.js"></script>
<title>경북 지능공간정보 플랫폼</title>
</head>
<body>

	<!-- layerpop-wrap 토지거래 허가구역 추가 --> <!-- 퍼블에서 화면 preview 하기위헤 style로 넣어줌 실제 개발할때는 style 삭제해주세요!! -->
	<div class="layerpop-wrap land w564" id="popup1" style="display:block; height:400px; position:absolute; inset:0; margin:auto;">
		<header>
			<h3>보유현황 데이터 업로드</h3>
		</header>
		
		<!-- contents -->
		<div class="pop-con">
			<div class="s-info type04">
				<p><span class="fb">※ RTMS 연계가 불가능한 경우</span> 엑셀 또는 CSV 파일로 보유현황 데이터를 업로드할 수 있습니다.</p>
			</div>

			<!-- 파일등록 -->
			<div class="file-register row">
				<div class="file w100per">
					<div class="fileup-wrap type06">
						<input type="file" id="file_01" class="input-file-list">
						<label for="file_01" class="file-label"></label>
					</div>
				
					<!-- list -->
					<div class="file-list" style="display:none;">
						<p class="name w408"></p>
						<p>등록 준비됨</p>

						<button type="button" name="" id="" class="file-del-btn"></button>
					</div>
					<!-- list -->
				</div>
			</div>
			<!-- 파일등록 -->

		</div>
		<!-- contents -->
		
		<div class="pop-footer">
			<div class="btn-area">
				<button type="button" name="" id="" class="com-btn xl grayblue">취소</button>
				<button type="button" name="" id="" class="com-btn xl orange">업로드</button>
			</div>
		</div>
	</div>
	<!-- layerpop-wrap 토지거래 허가구역 추가 -->

	<div class="overlay"></div>
	<script>
		$(function(){
			// 파일 선택 시
			$(document).on('change', '.input-file-list', function(){
				var fileName = $(this).val().split('\\').pop();
				var $fileList = $(this).closest('.file').find('.file-list');
				
				if(fileName) {
					$fileList.find('.name').text(fileName);
					$fileList.show();
				}
			});

			// 삭제 버튼 클릭 시
			$(document).on('click', '.file-del-btn', function(){
				var $fileList = $(this).closest('.file-list');
				var $fileInput = $fileList.siblings('.fileup-wrap').find('.input-file-list');
				
				$fileInput.val(''); 
				$fileList.hide();
			});
		});
	</script>
</body>
</html>
