<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="css/gb_Intelligent.css">
	<link rel="stylesheet" href="css/select2.min.css">
	<script src="js/lib/jquery-3.7.1.js"></script>
	<script src="js/lib/select2.min.js"></script>
	<script src="js/ui.js"></script>
	<title>경북 지능공간정보 플랫폼</title>
  <script type="module" crossorigin src="./js/modulepreload-polyfill.js"></script>
  <script type="module" crossorigin src="./js/main.js"></script>
  <link rel="stylesheet" crossorigin href="./css/main.css">
</head>

<body>
	<div class="all-wrap">
		<!-- header -->
		<header>
			<div class="top-menu-wrap">
				<div class="logo-area">
					<a href="#" class="home"></a>
					<a href="#" class="logo"></a> <span>지능공간정보 플랫폼</span>
				</div>

				<div class="top-menu">

					<a href="#" class="intelli active">지능공간정보</a>
					<a href="#" class="property">도유재산</a>
					<a href="#" class="land">토지정보</a>
					

					<div class="popover-menu-wrap intelli active">
						<div class="tab-menu">
							<ul>
								<li><a href="#" class="active">통합지도</a></li>
								<li><a href="#">3D지도</a></li>
								<li><a href="#">실내지도</a></li>
								<li><a href="#">주제도</a></li>
								<li><a href="#">검색</a></li>
								<li><a href="#">분석</a></li>
								<li><a href="#">통계지도</a></li>
								<li><a href="#">마이 데이터</a></li>
								<li><a href="#">입지분석 시뮬레이션</a></li>
							</ul>
						</div>
					</div>

				</div>

				<div class="login-info">
					<p>경상북도청</p>
					<p class="name">홍길동 님</p>
				</div>
			</div>
		</header>
		<!-- header -->

		<!-- content -->
		<div class="content-wrap">
			<div class="content">
				<div class="vibe-container map-statistics-page">
				
					<!-- 통계지도: map-ui 탭·폼 공통 클래스, 페이지 전용은 .map-statistics-sidebar__* -->
					<aside class="map-search-sidebar map-statistics-sidebar is-open" id="statisticsPanel">
					  <div class="map-search-sidebar__inner">
					    <header class="map-search-sidebar__header map-statistics-sidebar__header">
					      <h2>통계지도</h2>
					      <button type="button" class="map-search-sidebar__close" data-target="statisticsPanel" title="닫기">닫기</button>
					    </header>
					    <div class="map-search-sidebar__body map-statistics-sidebar__body">
					      <div class="map-statistics-sidebar__main" data-statistics-tabs>
					        <div class="map-ui-tabs map-statistics-sidebar__tabs" role="tablist" aria-label="통계 구분">
					          <button type="button" class="map-ui-tabs__item is-active" role="tab" aria-selected="true" data-map-ui-tab="population"><span>인구</span></button>
					          <button type="button" class="map-ui-tabs__item" role="tab" aria-selected="false" data-map-ui-tab="housing"><span>주택</span></button>
					          <button type="button" class="map-ui-tabs__item" role="tab" aria-selected="false" data-map-ui-tab="household"><span>가구</span></button>
					        </div>
					        <button type="button" class="map-statistics-sidebar__chart-btn">차트보기</button>
					
					        <div class="map-statistics-sidebar__panel" data-map-ui-content="population">
					          <div class="map-statistics-sidebar__filter-grid">
					            <div class="map-ui-form-group map-statistics-sidebar__field">
					              <label for="statPopCategory">분류</label>
					              <select id="statPopCategory" class="map-ui-select" title="분류">
					                <option>총인구</option>
					              </select>
					            </div>
					            <div class="map-ui-form-group map-statistics-sidebar__field">
					              <label for="statPopDataType">자료유형</label>
					              <select id="statPopDataType" class="map-ui-select" title="자료유형">
					                <option>총인구(전체)</option>
					              </select>
					            </div>
					            <div class="map-ui-form-group map-statistics-sidebar__field">
					              <label for="statPopSigungu">시군구</label>
					              <select id="statPopSigungu" class="map-ui-select" title="시군구">
					                <option>전체</option>
					              </select>
					            </div>
					            <div class="map-ui-form-group map-statistics-sidebar__field">
					              <label for="statPopEmd">읍면동</label>
					              <select id="statPopEmd" class="map-ui-select" title="읍면동">
					                <option>전체</option>
					              </select>
					            </div>
					            <div class="map-ui-form-group map-statistics-sidebar__field">
					              <label for="statPopGrid">격자</label>
					              <select id="statPopGrid" class="map-ui-select" title="격자">
					                <option>1km x 1km</option>
					              </select>
					            </div>
					            <div class="map-ui-form-group map-statistics-sidebar__field">
					              <label for="statPopYear">연도선택</label>
					              <select id="statPopYear" class="map-ui-select" title="연도">
					                <option>2024년</option>
					              </select>
					            </div>
					          </div>
					        </div>
					
					        <div class="map-statistics-sidebar__panel" data-map-ui-content="housing" hidden>
					          <div class="map-statistics-sidebar__filter-grid">
					            <div class="map-ui-form-group map-statistics-sidebar__field">
					              <label for="statHouseCategory">분류</label>
					              <select id="statHouseCategory" class="map-ui-select" title="분류">
					                <option>주택 유형</option>
					              </select>
					            </div>
					            <div class="map-ui-form-group map-statistics-sidebar__field">
					              <label for="statHouseDataType">자료유형</label>
					              <select id="statHouseDataType" class="map-ui-select" title="자료유형">
					                <option>총주택</option>
					              </select>
					            </div>
					            <div class="map-ui-form-group map-statistics-sidebar__field">
					              <label for="statHouseSigungu">시군구</label>
					              <select id="statHouseSigungu" class="map-ui-select" title="시군구">
					                <option>전체</option>
					              </select>
					            </div>
					            <div class="map-ui-form-group map-statistics-sidebar__field">
					              <label for="statHouseEmd">읍면동</label>
					              <select id="statHouseEmd" class="map-ui-select" title="읍면동">
					                <option>전체</option>
					              </select>
					            </div>
					            <div class="map-ui-form-group map-statistics-sidebar__field">
					              <label for="statHouseGrid">격자</label>
					              <select id="statHouseGrid" class="map-ui-select" title="격자">
					                <option>1km x 1km</option>
					              </select>
					            </div>
					            <div class="map-ui-form-group map-statistics-sidebar__field">
					              <label for="statHouseYear">연도선택</label>
					              <select id="statHouseYear" class="map-ui-select" title="연도">
					                <option>2024년</option>
					              </select>
					            </div>
					          </div>
					        </div>
					
					        <div class="map-statistics-sidebar__panel" data-map-ui-content="household" hidden>
					          <div class="map-statistics-sidebar__filter-grid">
					            <div class="map-ui-form-group map-statistics-sidebar__field">
					              <label for="statHhCategory">분류</label>
					              <select id="statHhCategory" class="map-ui-select" title="분류">
					                <option>가구 구성</option>
					              </select>
					            </div>
					            <div class="map-ui-form-group map-statistics-sidebar__field">
					              <label for="statHhDataType">자료유형</label>
					              <select id="statHhDataType" class="map-ui-select" title="자료유형">
					                <option>총가구</option>
					              </select>
					            </div>
					            <div class="map-ui-form-group map-statistics-sidebar__field">
					              <label for="statHhSigungu">시군구</label>
					              <select id="statHhSigungu" class="map-ui-select" title="시군구">
					                <option>전체</option>
					              </select>
					            </div>
					            <div class="map-ui-form-group map-statistics-sidebar__field">
					              <label for="statHhEmd">읍면동</label>
					              <select id="statHhEmd" class="map-ui-select" title="읍면동">
					                <option>전체</option>
					              </select>
					            </div>
					            <div class="map-ui-form-group map-statistics-sidebar__field">
					              <label for="statHhGrid">격자</label>
					              <select id="statHhGrid" class="map-ui-select" title="격자">
					                <option>1km x 1km</option>
					              </select>
					            </div>
					            <div class="map-ui-form-group map-statistics-sidebar__field">
					              <label for="statHhYear">연도선택</label>
					              <select id="statHhYear" class="map-ui-select" title="연도">
					                <option>2024년</option>
					              </select>
					            </div>
					          </div>
					        </div>
					
					        <div class="sidebar__footer">
					          <button type="button" class="sidebar__footer-btn sidebar__footer-btn--primary">실행 (Run)</button>
					        </div>
					      </div>
					    </div>
					  </div>
					  <button type="button" class="map-search-sidebar__open" data-target="statisticsPanel">열기</button>
					</aside>
				
					<div class="map-area">
						<div id="map-container"></div>
						
						<div class="map-toolbar-wrap">
							<button type="button" class="map-toolbar__btn" data-tool="theme">
								<span class="map-toolbar__label">주제도</span>
							</button>
							
							<div class="map-toolbar" aria-label="지도 도구">
								<button type="button" class="map-toolbar__btn" data-tool="basemap">
									<span class="map-toolbar__label">3D</span>
								</button>
								
								<button type="button" class="map-toolbar__btn" data-tool="distance">
									<span class="map-toolbar__label">거리</span>
								</button>
								<button type="button" class="map-toolbar__btn" data-tool="area">
									<span class="map-toolbar__label">면적</span>
								</button>
								<button type="button" class="map-toolbar__btn" data-tool="elevation">
									<span class="map-toolbar__label">표고</span>
								</button>
								<button type="button" class="map-toolbar__btn" data-tool="radius">
									<span class="map-toolbar__label">반경</span>
								</button>
								<button type="button" class="map-toolbar__btn" data-tool="draw">
									<span class="map-toolbar__label">그리기</span>
								</button>
								<button type="button" class="map-toolbar__btn" data-tool="print">
									<span class="map-toolbar__label">인쇄</span>
								</button>
								<button type="button" class="map-toolbar__btn" data-tool="save">
									<span class="map-toolbar__label">저장</span>
								</button>
								<button type="button" class="map-toolbar__btn" data-tool="roadview">
									<span class="map-toolbar__label">로드뷰</span>
								</button>
								<button type="button" class="map-toolbar__btn" data-tool="info">
									<span class="map-toolbar__label">정보보기</span>
								</button>
							</div>
						
							<div class="map-toolbar__btn-wrap">
								<button type="button" class="map-toolbar__btn" data-tool="compass" title="나침반"></button>
							</div>
							<div class="map-toolbar__btn-wrap">
								<button type="button" class="map-toolbar__btn" data-tool="current-location" title="현재위치"></button>
							</div>
							<div class="map-toolbar__btn-wrap">
								<button type="button" class="map-toolbar__btn" data-tool="home" title="홈"></button>
							</div>
							
						</div>	</div>
				
					<div class="map-ui-modal-backdrop absolute is-open" id="chartModal" aria-hidden="true">
						<div class="map-ui-modal">
							<header class="map-ui-modal__header">
								<h3>차트보기</h3>
								<button type="button" class="map-ui-modal__close" aria-label="닫기" data-chart-close></button>
							</header>
							<div class="map-ui-modal__body">
								<div class="map-ui-modal__content">
									<div class="map-ui-chart">
										<div class="map-ui-wizard__tab-stack">
											<div class="map-ui-tabs" role="tablist" aria-label="차트 유형">
												<button type="button" class="map-ui-tabs__item is-active" role="tab" aria-selected="true"
													data-map-ui-tab="pie"><span>원형 그래프</span></button>
												<button type="button" class="map-ui-tabs__item" role="tab" aria-selected="false"
													data-map-ui-tab="line"><span>꺾은선 그래프</span></button>
												<button type="button" class="map-ui-tabs__item" role="tab" aria-selected="false"
													data-map-ui-tab="bar"><span>막대 그래프</span></button>
											</div>
											<div class="map-ui-wizard__tab-panels">
												<div class="map-ui-wizard__tab-panel map-ui-chart__panel is-active" data-map-ui-content="pie">
													차트 영역
												</div>
											</div>
										</div>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
				
			</div>
		</div>
		<!-- content -->
	</div>

</body>

</html>
