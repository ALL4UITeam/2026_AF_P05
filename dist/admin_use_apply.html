<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/gb_intelligent.css">
<link href="css/select2.min.css" rel="stylesheet" />
<script src="js/lib/jquery-3.7.1.js"></script>
<script src="js/lib/select2.min.js"></script>
<script src="js/ui.js"></script>
<title>경북 지능공간정보 플랫폼</title>
</head>
<body>
	<div class="all-wrap center">
		<!-- header -->
		<header>
			<div class="top-menu-wrap center">
				<div class="logo-area">
					<a href="#" class="logo"></a> <span>지능공간정보 플랫폼</span>
				</div>
			</div>
		</header>
		<!-- header -->

		<!-- content -->
		<div class="content-wrap center">
			<div class="content">
				<!-- layerpop-wrap -->
				<div class="layerpop-wrap w564" id="popup1" style="display:block; position:relative; height:496px;">
					<header>
						<h3>사용 신청</h3>
					</header>
		
					<!-- contents -->
					<div class="pop-con">
						<!-- tbl -->
						<table class="tbl view type02">
							<colgroup>
								<col style="width:96px;">
								<col>
							</colgroup>
							<tbody>
								<tr>
									<th><label for="">시도포털ID</label></th>
									<td>
										<input type="text" name="" id="" class="type01" value="" disabled>
									</td>
								</tr>
								<tr>
									<th><label for="">새올ID</label></th>
									<td>
										<input type="text" name="" id="" class="type01" value="" disabled>
									</td>
								</tr>
								<tr>
									<th><label for="">직급</label></th>
									<td>
										<input type="text" name="" id="" class="type01" value="" placeholder="직급 입력">
									</td>
								</tr>
								<tr>
									<th><label for="">성명</label> <span class="essen">*</span></th>
									<td>
										<input type="text" name="" id="" class="type01" value="" placeholder="성명 입력">
									</td>
								</tr>
								<tr>
									<th><label for="">시군구</label> <span class="essen">*</span></th>
									<td>
										<select name="" id="" class="type02">
											<option>시군 전체 선택</option>
											<option>시군</option>
											<option>시군</option>
										</select>
									</td>
								</tr>
								<tr>
									<th><label for="">기관(부서)</label> <span class="essen">*</span></th>
									<td>
										<select name="" id="" class="type02">
											<option>기관 전체 선택</option>
											<option>기관</option>
											<option>기관</option>
										</select>
									</td>
								</tr>
								<tr>
									<th><label for="">상위 (부서)</label> <span class="essen">*</span></th>
									<td>
										<select name="" id="" class="type02">
											<option>상위 전체 선택</option>
											<option>상위</option>
											<option>상위</option>
										</select>
									</td>
								</tr>
								<tr>
									<th><label for="">하위 (부서)</label> <span class="essen">*</span></th>
									<td>
										<select name="" id="" class="type02">
											<option>하위 전체 선택</option>
											<option>하위</option>
											<option>하위</option>
										</select>
									</td>
								</tr>
							</tbody>
						</table>
						<!-- tbl -->
					</div>
					<!-- contents -->
		
					<div class="pop-footer">
						<div class="btn-area">
							<button type="button" name="" id="" class="com-btn xl grayblue">취소</button>
							<button type="button" name="" id="" class="com-btn xl blue">신청</button>
						</div>
					</div>
				</div>
				<!-- layerpop-wrap -->
			</div>
		</div>
		<!-- content -->

		<div class="reaultInfo error" style="display:block;">
			필수값을 모두 선택 또는 입력해 주세요.
		</div>
	</div>
</body>
</html>
