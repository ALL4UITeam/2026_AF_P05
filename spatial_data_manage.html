{{#> layout3}}

<div class="cont-box-wrap spatial-data-mgmt-wrap">
  <div class="cont-box spatial-data-mgmt">


    <div class="tit-wrap spatial-data-mgmt__page-head">
      <h2>공간데이터 관리</h2>
      <span class="spatial-dash__breadcrumb">데이터관리 &gt; 공간데이터 관리</span>
    </div>

    <section class="spatial-data-mgmt__card" aria-labelledby="spatial-mgmt-search-title">
      <h3 id="spatial-mgmt-search-title" class="spatial-data-mgmt__card-title spatial-data-mgmt__card-title--collapsible">
        검색조건 입력
      </h3>
      <div class="spatial-data-mgmt__search-body">
        <div class="spatial-data-mgmt__search-grid">
          <div class="spatial-data-mgmt__form-row">
            <label for="spatialMgmtDataName" class="data-request__label">데이터명</label>
            <input type="text" id="spatialMgmtDataName" class="type01 spatial-data-mgmt__input-full" placeholder="데이터명을 입력하세요." value="">
          </div>
          <div class="spatial-data-mgmt__form-row">
            <label for="spatialMgmtCrs" class="data-request__label">좌표계</label>
            <select id="spatialMgmtCrs" class="type01 spatial-data-mgmt__input-full">
              <option selected>전체</option>
              <option>EPSG:4326</option>
              <option>EPSG:5174</option>
              <option>EPSG:5179</option>
            </select>
          </div>
        </div>
        <div class="spatial-data-mgmt__search-actions">
          <button type="button" class="com-btn blue">검색</button>
        </div>
      </div>
    </section>

    <section class="spatial-data-mgmt__card spatial-data-mgmt__card--result" aria-labelledby="spatial-mgmt-result-title">
      <div class="spatial-data-mgmt__result-bar">
        <h3 id="spatial-mgmt-result-title" class="spatial-data-mgmt__card-title spatial-data-mgmt__card-title--plain">총 <span class="spatial-data-mgmt__total-num">5</span> 건</h3>
        <button type="button" class="com-btn blue">등록</button>
      </div>

      <div class="tbl-wrap spatial-data-mgmt__table-wrap">
        <table class="tbl">
          <colgroup>
            <col style="width:5%;">
            <col style="width:auto;">
            <col style="width:12%;">
            <col style="width:8%;">
            <col style="width:7%;">
            <col style="width:8%;">
            <col style="width:11%;">
            <col style="width:12%;">
          </colgroup>
          <thead>
            <tr>
              <th>No.</th>
              <th>데이터명</th>
              <th>좌표계</th>
              <th>서비스</th>
              <th>보안</th>
              <th>공동사용</th>
              <th>등록일</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td class="al">연속지적도_경북</td>
              <td><span class="spatial-data-mgmt__epsg">EPSG:5174</span></td>
              <td>
                <button type="button" class="spatial-data-mgmt__svc spatial-data-mgmt__svc--on" aria-pressed="true" title="서비스 여부"></button>
              </td>
              <td><label for="sdmSec01" class="chkbox"><input type="checkbox" id="sdmSec01" checked><span class="chkOn"></span></label></td>
              <td><label for="sdmShr01" class="chkbox"><input type="checkbox" id="sdmShr01" checked><span class="chkOn"></span></label></td>
              <td>2026-02-01</td>
              <td><button type="button" class="com-btn grayblue spatial-data-mgmt__act-btn">좌표변환</button></td>
            </tr>
            <tr>
              <td>2</td>
              <td class="al">행정구역_시군구</td>
              <td><span class="spatial-data-mgmt__epsg">EPSG:5179</span></td>
              <td>
                <button type="button" class="spatial-data-mgmt__svc spatial-data-mgmt__svc--on" aria-pressed="true" title="서비스 여부"></button>
              </td>
              <td><label for="sdmSec02" class="chkbox"><input type="checkbox" id="sdmSec02" checked><span class="chkOn"></span></label></td>
              <td><label for="sdmShr02" class="chkbox"><input type="checkbox" id="sdmShr02" checked><span class="chkOn"></span></label></td>
              <td>2026-01-20</td>
              <td><button type="button" class="com-btn grayblue spatial-data-mgmt__act-btn">좌표변환</button></td>
            </tr>
            <tr>
              <td>3</td>
              <td class="al">상수도관로_현황</td>
              <td><span class="spatial-data-mgmt__epsg">EPSG:5174</span></td>
              <td>
                <button type="button" class="spatial-data-mgmt__svc" aria-pressed="false" title="서비스 여부"></button>
              </td>
              <td><label for="sdmSec03" class="chkbox"><input type="checkbox" id="sdmSec03"><span class="chkOn"></span></label></td>
              <td><label for="sdmShr03" class="chkbox"><input type="checkbox" id="sdmShr03" checked><span class="chkOn"></span></label></td>
              <td>2025-11-30</td>
              <td><button type="button" class="com-btn grayblue spatial-data-mgmt__act-btn">좌표변환</button></td>
            </tr>
            <tr>
              <td>4</td>
              <td class="al">도로명주소_도로</td>
              <td><span class="spatial-data-mgmt__epsg">EPSG:4326</span></td>
              <td>
                <button type="button" class="spatial-data-mgmt__svc" aria-pressed="false" title="서비스 여부"></button>
              </td>
              <td><label for="sdmSec04" class="chkbox"><input type="checkbox" id="sdmSec04" checked><span class="chkOn"></span></label></td>
              <td><label for="sdmShr04" class="chkbox"><input type="checkbox" id="sdmShr04"><span class="chkOn"></span></label></td>
              <td>2025-12-15</td>
              <td><button type="button" class="com-btn grayblue spatial-data-mgmt__act-btn">좌표변환</button></td>
            </tr>
            <tr>
              <td>5</td>
              <td class="al">수질오염_관측소</td>
              <td><span class="spatial-data-mgmt__epsg">EPSG:5174</span></td>
              <td>
                <button type="button" class="spatial-data-mgmt__svc spatial-data-mgmt__svc--on" aria-pressed="true" title="서비스 여부"></button>
              </td>
              <td><label for="sdmSec05" class="chkbox"><input type="checkbox" id="sdmSec05"><span class="chkOn"></span></label></td>
              <td><label for="sdmShr05" class="chkbox"><input type="checkbox" id="sdmShr05" checked><span class="chkOn"></span></label></td>
              <td>2026-02-05</td>
              <td><button type="button" class="com-btn grayblue spatial-data-mgmt__act-btn">좌표변환</button></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="paging-wrap spatial-data-mgmt__paging">
        <ul class="paging">
          <li><a class="prev first" href="#"></a></li>
          <li><a class="prev" href="#"></a></li>
          <li><a class="pLink active" href="#">1</a></li>
          <li><a class="pLink" href="#">2</a></li>
          <li><a class="pLink" href="#">3</a></li>
          <li><a class="next" href="#"></a></li>
          <li><a class="next last" href="#"></a></li>
        </ul>
      </div>
    </section>
  </div>
</div>

{{/layout3}}
