{{#> layout}}
<div class="vibe-container map-spatial-page">
	{{> map-spatial-panel}}
	<div class="map-area">
		<div id="map-container"></div>
		{{> map-toolbar}}
	</div>

  <div class="map-ui-modal-backdrop is-open" id="spatialModal" aria-hidden="true">
    <div class="map-ui-modal map-spatial-result">
      <header class="map-ui-modal__header">
        <h3>공간검색 결과</h3>
        <button type="button" class="map-ui-modal__close" aria-label="닫기"></button>
      </header>
      <div class="map-ui-modal__body">
        <div class="map-ui-modal__content">
          <div class="map-spatial-result__sections">
            <section class="map-spatial-result__panel map-spatial-result__panel--summary">
              <h4 class="map-spatial-result__title">분석 영역 정보</h4>
              <div class="map-spatial-result__summary-top">
                <span>중심거리 ID: 2</span>
                <span>반경: 50m</span>
              </div>
              <p class="map-spatial-result__summary-value">7,854 <em>m²</em></p>
            </section>

            <section class="map-spatial-result__panel">
              <h4 class="map-spatial-result__title">주변 레이어 속성</h4>

              <article class="map-spatial-result__item">
                <div class="map-spatial-result__item-head">
                  <strong>도로 (인접)</strong>
                  <span>2건</span>
                </div>
                <div class="map-spatial-result__item-row"><span>도청대로</span><span>왕복 8차선</span></div>
                <div class="map-spatial-result__item-row"><span>경북로</span><span>왕복 4차선</span></div>
              </article>

              <article class="map-spatial-result__item">
                <div class="map-spatial-result__item-head">
                  <strong>소방 시설</strong>
                  <span>1건</span>
                </div>
                <div class="map-spatial-result__item-row"><span>지상식 소화전</span><span class="is-danger">50m 이내</span></div>
              </article>

              <article class="map-spatial-result__item">
                <div class="map-spatial-result__item-head">
                  <strong>추정 인구</strong>
                  <span>통계</span>
                </div>
                <div class="map-spatial-result__stats">
                  <div><span>유동인구</span><strong>1,240명</strong></div>
                  <div><span>거주인구</span><strong>850명</strong></div>
                </div>
              </article>
            </section>

            <div class="map-spatial-result__footer">
              <button type="button" class="map-spatial-result__btn">결과 저장 (CSV)</button>
              <button type="button" class="map-spatial-result__btn map-spatial-result__btn--primary">보고서 출력</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{{/layout}}
