{{#> layout2}}

<div class="cont-box-wrap">
  <div class="cont-box">
    <div class="board-header">
      <span class="board-badge">가이드</span>
      <h2 class="board-title">지도 조회/분석 가이드</h2>
      <div class="board-meta">
        <span class="meta-item"><span class="meta-label icon1">작성자</span> <span class="meta-value">관리자</span></span>
        <span class="meta-item"><span class="meta-label icon2">등록일</span> <span class="meta-value">2023.10.20</span></span>
        <span class="meta-item"><span class="meta-label icon3">조회수</span> <span class="meta-value">1250회</span></span>
      </div>
    </div>

    <div class="board-body">
      <div class="board-info-box">
        <ol class="board-info-list">
          <li>
            <span class="info-label">1단계</span>
            <span class="info-text">좌측 메뉴에서 조회할 레이어를 선택합니다.</span>
          </li>
          <li>
            <span class="info-label">2단계</span>
            <span class="info-text">지도를 이동/확대해 관심 영역을 맞춘 뒤 분석 도구를 실행합니다.</span>
          </li>
          <li>
            <span class="info-label">3단계</span>
            <span class="info-text">결과를 확인하고 필요 시 파일로 저장합니다.</span>
          </li>
        </ol>
      </div>
    </div>

    <div class="board-footer">
      <div class="board-nav">
        <button type="button" class="nav-arrow prev" disabled aria-label="이전 글">
          <span class="arrow-icon"></span>
        </button>
        <button type="button" class="nav-arrow next" aria-label="다음 글">
          <span class="arrow-icon"></span>
        </button>
      </div>
      <a href="/communication_guide.html" class="btn-list">목록으로</a>
    </div>
  </div>
</div>

{{/layout2}}
