{{#> layout3}}

<div class="cont-box-wrap">
  <div class="cont-box write-form qna-write-form">
    <div class="tit-wrap">
      <h2>질의응답 등록</h2>
    </div>
    <p class="write-form__guide">질문과 답변을 함께 등록해 이력 조회와 사용자 대응에 활용해 주세요.</p>

    <div class="tbl-wrap write-form__table">
      <table class="tbl">
        <colgroup>
          <col style="width:180px;">
          <col style="width:auto;">
        </colgroup>
        <tbody>
          <tr>
            <th>제목</th>
            <td><input type="text" class="type01" placeholder="제목을 입력하세요."></td>
          </tr>
          <tr>
            <th>카테고리</th>
            <td>
              <select class="type01">
                <option>지도 서비스</option>
                <option>접속 오류</option>
                <option>자료 다운로드</option>
                <option>계정/권한</option>
                <option>기타</option>
              </select>
            </td>
          </tr>
          <tr>
            <th>진행 상태 <span class="p-color03">*</span></th>
            <td>
              <select class="type01 qna-write-form__status">
                <option>답변대기</option>
                <option>답변완료</option>
              </select>
            </td>
          </tr>
          <tr>
            <th>질문 내용</th>
            <td><textarea class="type01 qna-write-form__textarea" placeholder="질문 내용을 입력하세요."></textarea></td>
          </tr>
          <tr>
            <th>답변 내용</th>
            <td><textarea class="type01 qna-write-form__textarea" placeholder="답변 내용을 입력하세요."></textarea></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="form-wrap write-form__actions">
      <a href="/system_qna_list.html" class="com-btn blue w200">목록</a>
      <button type="button" class="com-btn blue w200">저장</button>
    </div>
  </div>
</div>

{{/layout3}}
