{{#> layout}}

<div class="vibe-container map-search-page">
	
	{{> map-search-menu}}
	<!-- 우측: 지도 영역 (전체 채움) -->
	<div class="map-area">
		<div id="map-container"></div>
		
		{{> map-toolbar}}
		{{> map-search-zoom}}
		{{> map-floating-controls}}
		{{> map-building-info}}
		{{> map-options}}

		<!-- 토지(임야) 검색 플로트 -->
		<div class="map-ui-modal-backdrop lnd-stack is-open" id="landSearchFloatStack" aria-hidden="true">
			<div class="lnd-rslt" id="landSearchResultPanel">
				<header class="map-ui-modal__header lnd-rslt__hd">
					<h3><i class="menu_icon" aria-hidden="true"></i>토지 검색 결과 목록</h3>
					<button type="button" class="lnd-rslt__fold" aria-expanded="true"></button>
				</header>
				<div class="lnd-rslt__body" id="landSearchResultBody">
					<input type="search" class="map-ui-input lnd-rslt__q" id="landSearchResultQuery" readonly value="경상북도 문경시 점촌동 123-4">
					<ol class="lnd-rslt__list" id="landSearchResultList">
						<li><button type="button" class="lnd-rslt__item is-active"><span class="lnd-rslt__no">1</span> 경상북도 문경시 점촌동 123-4</button></li>
					</ol>
				</div>
			</div>
			<div class="map-ui-modal lnd-modal" id="landSearchDetailModal">
				<header class="map-ui-modal__header">
					<h3>토지(임야) 검색</h3>
					<button type="button" class="map-ui-modal__close" aria-label="닫기" data-land-search-close></button>
				</header>
				<div class="map-ui-modal__body">
					<div class="map-ui-modal__content lnd-dtl" data-land-search-detail>
						<div class="lnd-tags">
							<span class="lnd-tag lnd-tag_pri">대지</span>
							<span class="lnd-tag lnd-tag_mute">일반</span>
						</div>
						<p class="lnd-addr" data-land-search-address>경상북도 문경시 점촌동 123-4</p>
						<section class="lnd-sec">
							<h4 id="landHdrBasic" class="lnd-h">기본정보</h4>
							<div class="lnd-tbl">
								<div class="lnd-row">
									<div class="lnd-lbl">지목</div>
									<div class="lnd-val" data-land-jimok>대 (08)</div>
								</div>
								<div class="lnd-row">
									<div class="lnd-lbl">면적</div>
									<div class="lnd-val" data-land-area>345.2㎡</div>
								</div>
								<div class="lnd-row">
									<div class="lnd-lbl">소유구분</div>
									<div class="lnd-val" data-land-owner>사유지</div>
								</div>
								<div class="lnd-row">
									<div class="lnd-lbl">변동일자</div>
									<div class="lnd-val" data-land-changed>2021-05-12</div>
								</div>
							</div>
						</section>
						<section class="lnd-sec lnd-sec_price">
							<h4 id="landHdrPrice" class="lnd-h">공시가 정보</h4>
							<div class="lnd-price">
								<p class="lnd-pnote" data-land-price-meta>2023년 1월 기준 (㎡)</p>
								<p class="lnd-pval" data-land-price>1,245,000 원</p>
								<button type="button" class="lnd-trend">연도별 변동 추이 보기</button>
							</div>
						</section>
					</div>
				</div>
			</div>
		</div>


	</div>
</div>
{{/layout}}
