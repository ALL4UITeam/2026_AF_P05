{{#> layout}}
<div class="vibe-container map-search-page">
	<!-- 좌측 사이드바: VWorld dtkmap 스타일 (고정 폭, 회색 배경) -->
	<aside class="map-search-sidebar" id="locationSearchPanel">
		<div class="map-search-sidebar__inner">
			<header class="map-search-sidebar__header">
				<h2>위치 검색</h2>
				<button title="닫기" class="map-search-sidebar__close" data-target="locationSearchPanel">
					닫기
				</button>
			</header>
			<div class="map-search-sidebar__body">
				<div class="sidebar__search">
					<div class="map-ui-form-group">
						<label for="searchSigungu">시군</label>
						<select id="searchSigungu" class="map-ui-select">
							<option value="">전체</option>
							<option value="andong">안동시</option>
							<option value="yeongyang">영양군</option>
							<option value="yeongju">영주시</option>
							<option value="gyeongsan">경산시</option>
						</select>
					</div>
					<div class="map-ui-form-group">
						<label for="searchEmd">읍면동</label>
						<select id="searchEmd" class="map-ui-select">
							<option value="">전체</option>
						</select>
					</div>
					<div class="map-ui-form-group">
						<label for="searchRi">리</label>
						<select id="searchRi" class="map-ui-select">
							<option value="">전체</option>
						</select>
					</div>
					<div class="sidebar__search-row">
						<input type="search" id="locationSearchInput" class="map-ui-input" placeholder="주소 또는 장소 검색" autocomplete="off">
						<button type="button" class="sidebar__search-btn" id="locationSearchBtn" aria-label="검색">
							<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
						</button>
					</div>
				</div>
				<div class="sidebar__results">
					<!--  -->
				</div>
			</div>
		</div>
		<button type="button" class="map-search-sidebar__open" data-target="locationSearchPanel">
			열기
		</button>
	</aside>
	<!-- 우측: 지도 영역 (전체 채움) -->
	<div class="map-area">
		<div id="map-container"></div>
		<!-- #3d 예시: URL에 #3d 있을 때만 보임 (data-hash-key 사용) -->
		<div data-hash-key="3d" class="hash-sample-badge" aria-hidden="true">3D 모드</div>
		<div class="map-search-breadcrumb">경기도 &gt; 안양시 동안구 &gt; 관양동</div>
		{{> map-toolbar}}
		{{> map-search-zoom}}
		<div class="map-draw-options" id="mapDrawOptions" aria-hidden="true">
			<h3 class="map-draw-options__title">도형 선택</h3>
			<div class="map-draw-options__buttons">
				<button type="button" class="map-draw-options__btn" data-draw="point">점 그리기</button>
				<button type="button" class="map-draw-options__btn" data-draw="line">선 그리기</button>
				<button type="button" class="map-draw-options__btn" data-draw="polygon">면 그리기</button>
			</div>
			<p class="map-draw-options__hint">도형 타입을 선택하세요.</p>
		</div>


		<div class="map-scale-bar">
			<span class="map-scale-bar__line"></span>
			<span class="map-scale-bar__labels">
				<span>0</span><span>100m</span><span>200m</span>
			</span>
		</div>

		<footer class="map-disclaimer">※ 연속지적도를 포함한 모든 주제도는 참고용으로만 사용하시기 바랍니다.</footer>
	</div>
</div>
{{/layout}}



<script>
  window.addEventListener('load', () => {
    if (window.__hashVisibility) {
      //window.__hashVisibility.set('3d', '1');
    }
  });
</script>
