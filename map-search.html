{{#> layout}}
<div class="vibe-container map-search-page">
	{{> map-menu-panel}}

	{{> map-search-location-panel}}
	{{> map-search-layer-panel}}
	{{> map-search-indoor-panel}}
	{{> map-search-theme-panel}}


	<!-- 우측: 지도 영역 (전체 채움) -->
	<div class="map-area">
		<div id="map-container"></div>
		<!-- #3d 예시: URL에 #3d 있을 때만 보임 (data-hash-key 사용) -->
		<div data-hash-key="3d" class="hash-sample-badge" aria-hidden="true">3D 모드</div>
		<div class="map-search-breadcrumb">경기도 &gt; 안양시 동안구 &gt; 관양동</div>
		<!-- {{> map-toolbar}}
		{{> map-search-zoom}}
		{{> map-floating-controls}} -->
		{{> map-building-info}}
		{{> map-options}}
		<div class="map-scale-bar">
			<span class="map-scale-bar__line"></span>
			<span class="map-scale-bar__labels">
				<span>0</span><span>100m</span><span>200m</span>
			</span>
		</div>

		<footer class="map-disclaimer">※ 연속지적도를 포함한 모든 주제도는 참고용으로만 사용하시기 바랍니다.</footer>
	</div>
</div>
{{/layout}}

<script>
  window.addEventListener('load', () => {
    if (window.__hashVisibility) {
      //window.__hashVisibility.set('3d', '1');
    }
  });
</script>
