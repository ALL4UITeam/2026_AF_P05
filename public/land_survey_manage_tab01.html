	<script src="js/lib/chart.js"></script> <!-- v4.5.1 -->
	<script src="js/lib/chartjs-plugin-datalabels@2.js"></script> <!-- v2.2.0 -->

	<script>
		Chart.register(ChartDataLabels);

		const colors = [
		"#3B5BA9","#4C77C9","#66A3D2","#6CC3C3",
		"#52B788","#8BC34A","#D4AF37","#F97316","#9C27B0"
		];

		const chart = new Chart(document.getElementById("pieChart1"), {
			type: "pie",
			data: {
				labels: [
				"구미시 (156건)",
				"안동시 (187건)",
				"포항시 (179건)",
				"칠곡군 (197건)",
				"영덕군 (156건)",
				"영양군 (195건)",
				"청송군 (170건)",
				"군위군 (157건)",
				"영천시 (178건)"
				],
				datasets: [{
				data: [156,187,179,197,156,195,170,157,178],
				backgroundColor: colors,
				borderWidth: 1
				}]
			},
			options: {
				responsive: true,
				maintainAspectRatio: false,

			plugins: {
			legend: { display: false },

			datalabels: {
				formatter: (value, ctx) => ctx.chart.data.labels[ctx.dataIndex],
				color: (ctx) => colors[ctx.dataIndex],
				font: { size: 12, weight: "bold" },
				anchor: "end",
				align: "end",
				offset: 20,
				clamp: false               // ✅ 바깥으로 나가게 (잘리면 padding/부모높이로 해결)
			}
			},

			layout: {
			padding: { top: 50, right: 70, bottom: 50, left: 70 } // ✅ 잘림 방지
			}
		}
	});

	setTimeout(() => chart.resize(), 50);
	</script>
