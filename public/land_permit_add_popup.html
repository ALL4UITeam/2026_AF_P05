<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/gb_intelligent.css">
<link href="css/select2.min.css" rel="stylesheet" />
<script src="js/lib/jquery-3.7.1.js"></script>
<script src="js/lib/select2.min.js"></script>
<script src="js/ui.js"></script>
<title>경북 지능공간정보 플랫폼</title>
</head>
<body>

	<!-- layerpop-wrap 토지거래 허가구역 추가 --> <!-- 퍼블에서 화면 preview 하기위헤 style로 넣어줌 실제 개발할때는 style 삭제해주세요!! -->
	<div class="layerpop-wrap land w1128" id="popup1" style="display:block; height:800px; position:absolute; inset:0; margin:auto;">
		<header>
			<h3>토지거래 허가구역 추가</h3>
		</header>
		
		<!-- contents -->
		<div class="pop-con">
			<div class="title-box left">
				<h3>새 허가구역 등록</h3>
				<span>새로운 토지거래 허가구역을 등록합니다.</span>
			</div>

			<!-- 기본정보 -->
			<h4 class="type02">기본정보</h4>

			<table class="tbl view type02">
				<colgroup>
					<col style="width:130px;">
					<col>
					<col style="width:130px;">
					<col>
				</colgroup>
				<tbody>
					<tr>
						<th><label for="">구역명</label> <span class="essen">*</span></th>
						<td>
							<input type="text" name="" id="seach" class="type01" value="예: 의성군">
						</td>
						<th><label for="">시군</label> <span class="essen">*</span></th>
						<td>
							<input type="text" name="" id="seach" class="type01" value="예: 의성군">
						</td>
					</tr>
					<tr>
						<th><label for="">상세 위치</label> <span class="essen">*</span></th>
						<td>
							<input type="text" name="" id="seach" class="type01" value="예: 봉양면 신평·안평·화전·사부리">
						</td>
						<th><label for="">면적</label> <span class="essen">*</span></th>
						<td>
							<input type="text" name="" id="seach" class="type01" value="예: 42.73㎢">
						</td>
					</tr>
					<tr>
						<th><label for="">지정 유형</label> <span class="essen">*</span></th>
						<td>
							<select name="" id="" class="type01">
								<option>신규지정</option>
								<option>신규지정</option>
								<option>신규지정</option>
							</select>
						</td>
						<th><label for="">상태</label> <span class="essen">*</span></th>
						<td>
							<select name="" id="" class="type01">
								<option>운영중</option>
								<option>운영중</option>
								<option>운영중</option>
							</select>
						</td>
					</tr>
				</tbody>
			</table>
			<!-- 기본정보 -->

			<!-- 기본정보 -->
			<h4 class="type02">기본정보</h4>

			<table class="tbl view type02">
				<colgroup>
					<col style="width:130px;">
					<col>
					<col style="width:130px;">
					<col>
				</colgroup>
				<tbody>
					<tr>
						<th><label for="">지정권자</label> <span class="essen">*</span></th>
						<td>
							<input type="text" name="" id="seach" class="type01" value="경상북도지사">
						</td>
						<th><label for="">공고일</label> <span class="essen">*</span></th>
						<td>
							<input type="date" name="" id="" class="type01" value="">
						</td>
					</tr>
					<tr>
						<th><label for="">시작일</label> <span class="essen">*</span></th>
						<td>
							<input type="date" name="" id="" class="type01" value="">
						</td>
						<th><label for="">종료일</label> <span class="essen">*</span></th>
						<td>
							<input type="date" name="" id="" class="type01" value="">
						</td>
					</tr>
					<tr>
						<th><label for="">최초 지정일<br/>(재지정인 경우)</label></th>
						<td>
							<input type="date" name="" id="" class="type01" value="">
						</td>
						<th><label for="">최초 지정권자<br/>(재지정인 경우)</label></th>
						<td>
							<input type="text" name="" id="" class="type01" value="경상북도지사">
						</td>
					</tr>
				</tbody>
			</table>
			<!-- 기본정보 -->

			<!-- 파일등록 -->
			<h4 class="type02">파일등록</h4>

			<div class="file-register">
				<div class="file">
					<h3>구역경계 정보</h3>

					<div class="fileup-wrap type03">
						<input type="file" id="file_01" class="input-file-list">
						<label for="file_01" class="file-label"></label>
					</div>
					
					<!-- list -->
					<div class="file-list" style="display:none;">
						<p class="name"></p>
						<p>등록 준비됨</p>

						<button type="button" name="" id="" class="file-del-btn"></button>
					</div>
					<!-- list -->
				</div>

				<div class="file">
					<h3>관련 공문 첨부</h3>

					<div class="fileup-wrap type04">
						<input type="file" id="file_02" class="input-file-list">
						<label for="file_02" class="file-label"></label>
					</div>

					<!-- list -->
					<div class="file-list" style="display:none;">
						<p class="name"></p>
						<p>등록 준비됨</p>

						<button type="button" name="" id="" class="file-del-btn"></button>
					</div>
					<!-- list -->
				</div>

				<div class="file">
					<h3>토지조서 등록</h3>
					
					<div class="fileup-wrap type05">
						<input type="file" id="file_03" class="input-file-list">
						<label for="file_03" class="file-label"></label>
					</div>

					<!-- list -->
					<div class="file-list" style="display:none;">
						<p class="name"></p>
						<p>등록 준비됨</p>

						<button type="button" name="" id="" class="file-del-btn"></button>
					</div>
					<!-- list -->
				</div>
			</div>
			<!-- 파일등록 -->

			<!-- 사유 -->
			<h4 class="type02">사유</h4>

			<textarea name="" id="" class="type01" placeholder="내용을 입력해주세요."></textarea>
			<!-- 사유 -->

		</div>
		<!-- contents -->
		
		<div class="pop-footer">
			<div class="btn-area lr">
				<button type="button" name="" id="" class="com-btn xl red">삭제</button>

				<div>
					<button type="button" name="" id="" class="com-btn xl grayblue">취소</button>
					<button type="button" name="" id="" class="com-btn xl orange">저장</button>
				</div>
			</div>
		</div>
	</div>
	<!-- layerpop-wrap 토지거래 허가구역 추가 -->

	<div class="overlay"></div>
	<script>
		$(function(){
			// 파일 선택 시
			$(document).on('change', '.input-file-list', function(){
				var fileName = $(this).val().split('\\').pop();
				var $fileList = $(this).closest('.file').find('.file-list');
				
				if(fileName) {
					$fileList.find('.name').text(fileName);
					$fileList.show();
				}
			});

			// 삭제 버튼 클릭 시
			$(document).on('click', '.file-del-btn', function(){
				var $fileList = $(this).closest('.file-list');
				var $fileInput = $fileList.siblings('.fileup-wrap').find('.input-file-list');
				
				$fileInput.val(''); 
				$fileList.hide();
			});
		});
	</script>
</body>
</html>
