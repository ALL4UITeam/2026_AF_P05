<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="css/gb_intelligent.css">
	<link href="css/select2.min.css" rel="stylesheet" />
	<script src="js/lib/jquery-3.7.1.js"></script>
	<script src="js/lib/select2.min.js"></script>
	<script src="js/ui.js"></script>
	<title>경북 지능공간정보 플랫폼</title>
	<style>
		#mapSvg .cls-3 {
			fill: #fff;
			cursor: pointer;
			transition: .15s;
			user-select: none;
		}

		#mapSvg .cls-3:hover {
			fill: url(#blueGrad);
			filter: url(#dropShadow);
		}

		#mapSvg .cls-3.is-active {
			fill: url(#blueGrad);
			filter: url(#dropShadow);
		}

		/* 텍스트(길/라벨)가 path로 들어간 경우 대비 */
		#mapSvg .cls-2 {
			pointer-events: none;
			/* 텍스트 위에 올려도 클릭은 면(cls-3)로 */
		}

		/* 기본 라벨 색 */
		#mapSvg .cls-2 {
			fill: #777;
			pointer-events: none
		}

		/* 활성화된 지역에 속한 라벨만 검정 */
		#mapSvg .cls-2.label-active {
			fill: #000 !important;
		}

		/* 툴팁 스타일 */
		.map-tooltip {
			position: absolute;
			background-color: rgba(255, 255, 255, 0.8);
			color: #000000;
			border: 1px solid #000;
			padding: 5px 10px;
			border-radius: 4px;
			font-size: 12px;
			max-width: 250px;
			/* 툴팁 최대 너비 설정 */
			line-height: 1.5;
			/* 줄 간격 조정 */
			text-align: left;
			/* 텍스트 왼쪽 정렬 */
			pointer-events: none;
			/* 마우스 이벤트가 툴팁을 가리지 않도록 설정 */
			z-index: 1000;
			display: none;
		}
	</style>
</head>

<body>
	<div class="all-wrap">
		<!-- header -->
		<header>

				<div class="logo-area">
					<a href="#" class="home"></a>

				</div>

					<a href="#" class="property active">도유재산</a>

				</div>

				<div class="login-info">
					<p>경상북도청</p>
					<p class="name">홍길동 님</p>
				</div>
			</div>
		</header>
		<!-- header -->

		<!-- content -->
		<div class="content-wrap">
			<!-- gnb -->
			<div class="gnb-wrap">
				<div class="gnb">
					<ul>
						<li>
							<a href="#" class="m01"></a><span>대쉬보드</span> <!-- active -->
						</li>
						<li>
							<a href="#" class="m02"></a><span>됴유지현황</span>
						</li>
						<li>
							<a href="#" class="m03"></a><span>분석결과</span>
						</li>
						<li>
							<a href="#" class="m04"></a><span>실태조사</span>
						</li>
						<li>
							<a href="#" class="m05"></a><span>제외지</span>
						</li>
						<li>
							<a href="#" class="m06"></a><span>통계</span>
						</li>
					</ul>
				</div>

				<button type="button" name="" id="" class="admin-btn"></button>

				<!-- admin -->

</html>
