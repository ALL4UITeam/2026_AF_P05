<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/gb_intelligent.css">
<link href="css/select2.min.css" rel="stylesheet" />
<script src="js/lib/jquery-3.7.1.js"></script>
<script src="js/lib/select2.min.js"></script>
<script src="js/lib/jquery.floatThead.min.js"></script>
<script src="js/ui.js"></script>
<title>경북 지능공간정보 플랫폼</title>

<body>
	<div class="all-wrap land">
		<!-- header -->
		<header>
			<div class="top-menu-wrap">

					<!-- 토지정보 sub 메뉴 -->
					<div class="popover-menu-wrap land">
						<div class="tab-menu">

								<li><a href="#" class="active" data-target="topTab01">토지 관리</a></li>
								<li><a href="#" data-target="topTab02">지적 관리</a></li>

							</div>
							<!-- 토지 관리 -->

							<div id="topTab02">

									<li><a href="#">지적확정측량 관리</a></li>

									<li><a href="#">적부심사</a></li>

							</div>
							<!-- 토지 관리 -->
						</div>
					</div>
					<!-- 토지정보 sub 메뉴 -->
				</div>

				<div class="login-info">
					<p>경상북도청</p>
					<p class="name">홍길동 님</p>

		<div class="content-wrap row type02">
			<!-- 검색 -->
			<div class="search-top-wrap">
				<div class="serach-box">
					<div class="form-wrap">

						<input type="text" name="" id="search" class="type01 searchIco" placeholder="지명 입력 (예: 죽도산)" required="true">

						<button type="button" name="" id="" class="com-btn orange w200">검색</button>
					</div>
				</div>

			<div class="nodata-wrap type04">

				</div>
			</div>

		</div>
