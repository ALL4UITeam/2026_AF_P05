<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/gb_intelligent.css">
<link href="css/select2.min.css" rel="stylesheet" />
<script src="js/lib/jquery-3.7.1.js"></script>
<script src="js/lib/select2.min.js"></script>
<script src="js/ui.js"></script>
<title>경북 지능공간정보 플랫폼</title>
</head>
<body>
<div>
	<!-- layerpop-wrap 신규 수행계획서 접수 등록 --> <!-- 퍼블에서 화면 preview 하기위헤 style로 넣어줌 실제 개발할때는 style 삭제해주세요!! -->
	<div class="layerpop-wrap land w1128" id="popup1" style="display:block; height:574px; position:absolute; inset:0; margin:auto;">
		<header>
			<h3>신규 수행계획서 접수 등록</h3>
		</header>
		
		<!-- contents -->
		<div class="pop-con">
			<div class="title-box left">
				<h3>새 허가구역 등록</h3>
				<span>새로운 토지거래 허가구역을 등록합니다.</span>
			</div>

			<h4 class="type02">기본정보</h4>

			<table class="tbl view type02">
				<colgroup>
					<col style="width:130px;">
					<col style="width:410px;">
					<col style="width:130px;">
					<col>
				</colgroup>
				<tbody>
					<tr>
						<th><label for="year">연변</label></th>
						<td>
							<input type="text" name="" id="year" class="type02" value="자동 생성" disabled>
						</td>
						<th><label for="city">시군</label> <span class="essen">*</span></th>
						<td>
							<input type="text" name="" id="city" class="type01" value="" placeholder="내용 입력">
						</td>
					</tr>
					<tr>
						<th><label for="receipt_date">접수일자</label> <span class="essen">*</span></th>
						<td>
							<input type="text" name="" id="receipt_date" class="type01" value="-">
						</td>
						<th><label for="district_name">지구명</label> <span class="essen">*</span></th>
						<td>
							<input type="text" name="" id="district_name" class="type01" value="" placeholder="내용 입력">
						</td>
					</tr>
					<tr>
						<th><label for="busi_name">사업명</label> <span class="essen">*</span></th>
						<td>
							<input type="text" name="" id="busi_name" class="type01" value="" placeholder="내용 입력">
						</td>
						<th><label for="lot_num">필지수</label></th>
						<td>
							<input type="text" name="" id="lot_num" class="type01" value="0" placeholder="내용 입력">
						</td>
					</tr>
					<tr>
						<th><label for="area">면적</label></th>
						<td>
							<div class="form">
								<input type="text" name="" id="area" class="type01" value="0" placeholder="내용 입력">
								<span class="unit">㎡</span>
							</div>
						</td>
						<th><label for="progress">진행 상태</label></th>
						<td>
							<select name="" id="progress" class="type01">
								<option>선택</option>
								<option>상태</option>
								<option>상태</option>
							</select>
						</td>
					</tr>
				</tbody>
			</table>

			<h4 class="type02">비고</h4>

			<textarea name="" id="" class="type01" value="" placeholder="내용을 입력해 주세요"></textarea>
		</div>
		<!-- contents -->
		
		<div class="pop-footer">
			<div class="btn-area">
				<button type="button" name="" id="" class="com-btn xl grayblue">취소</button>
				<button type="button" name="" id="" class="com-btn xl orange">저장</button>
			</div>
		</div>
	</div>
	<!-- layerpop-wrap 신규 수행계획서 접수 등록 -->


	<div class="overlay"></div>
</body>
</html>
