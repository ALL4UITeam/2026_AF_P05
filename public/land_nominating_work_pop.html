<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/gb_intelligent.css">
<link href="css/select2.min.css" rel="stylesheet" />
<script src="js/lib/jquery-3.7.1.js"></script>
<script src="js/lib/select2.min.js"></script>
<script src="js/ui.js"></script>
<title>경북 지능공간정보 플랫폼</title>
</head>
<body>

	<!-- layerpop-wrap 버퍼 분석 설정 --> <!-- 퍼블에서 화면 preview 하기위헤 style로 넣어줌 실제 개발할때는 style 삭제해주세요!! -->
	<div class="layerpop-wrap land w564" id="popup1" style="display:block; height:310px; position:absolute; inset:0; margin:auto;">
		<header>
			<h3>버퍼 분석 설정</h3>
		</header>
		
		<!-- contents -->
		<div class="pop-con">
			<table class="tbl view type02 mb12">
				<colgroup>
					<col style="width:130px;">
					<col>
				</colgroup>
				<tbody>
					<tr>
						<th><label for="">면적</label></th>
						<td>
							<div class="form">
								<input type="text" name="" id="" class="type01" value="500">
								<span class="unit">㎡</span>
							</div>
						</td>
					</tr>
				</tbody>
			</table>

			<div class="s-info type04">
				<p class="mb5">분석 반경 <span class="fb"> 500m</span></p>
				<p>선택한 지명과 시군구 경계와의 인접여부를 분석합니다.</p>
			</div>



		</div>
		<!-- contents -->
		
		<div class="pop-footer">
			<div class="btn-area">
				<button type="button" name="" id="" class="com-btn xl grayblue">취소</button>
				<button type="button" name="" id="" class="com-btn xl orange">분석실행</button>
			</div>
		</div>
	</div>
	<!-- layerpop-wrap 버퍼 분석 설정 -->

	<div class="overlay"></div>

</body>
</html>
