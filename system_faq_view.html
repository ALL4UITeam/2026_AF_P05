{{#> layout3}}

<div class="cont-box-wrap">
  <div class="cont-box">
    <div class="board-header">
      <span class="board-badge">FAQ</span>
      <h2 class="board-title">비밀번호 변경은 어디에서 하나요?</h2>
      <div class="board-meta">
        <span class="meta-item"><span class="meta-label icon1">작성자</span> <span class="meta-value">관리자</span></span>
        <span class="meta-item"><span class="meta-label icon2">등록일</span> <span class="meta-value">2023.10.20</span></span>
        <span class="meta-item"><span class="meta-label icon3">조회수</span> <span class="meta-value">1250회</span></span>
      </div>
    </div>

    <div class="board-body faq-view">
      <div class="faq-view__item faq-view__item--question">
        <span class="faq-view__badge faq-view__badge--question">Q</span>
        <div class="faq-view__content">
          <p class="faq-view__title">비밀번호 변경은 어디에서 하나요?</p>
          <p class="faq-view__desc">로그인 후 우측 상단 사용자 메뉴에서 설정할 수 있습니다.</p>
        </div>
      </div>

      <div class="faq-view__item faq-view__item--answer">
        <span class="faq-view__badge faq-view__badge--answer">A</span>
        <div class="faq-view__content">
          <p class="faq-view__title">내 정보 관리 메뉴에서 비밀번호를 변경해 주세요.</p>
          <p class="faq-view__desc">우측 상단 사용자 메뉴의 내 정보 관리에서 비밀번호 변경 메뉴를 통해 수정할 수 있습니다.</p>
        </div>
      </div>

      <p class="faq-view__tip">
        추가 문의가 필요한 경우 시스템 관리 담당자에게 연락해 주세요.
      </p>
    </div>

    <div class="board-footer">
      <div class="board-nav">
        <button type="button" class="nav-arrow prev" disabled aria-label="이전 글">
          <span class="arrow-icon"></span>
        </button>
        <button type="button" class="nav-arrow next" aria-label="다음 글">
          <span class="arrow-icon"></span>
        </button>
      </div>
      <div class="board-actions">
        <a href="/system_faq_write.html" class="btn-edit">수정</a>
        <a href="/system_faq_list.html" class="btn-list">목록으로</a>
      </div>
    </div>
  </div>
</div>

{{/layout3}}
