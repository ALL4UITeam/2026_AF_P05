{{#> layout}}
<div class="vibe-container map-search-page">
	

	{{> map-search-road}}

	<!-- 우측: 지도 영역 (전체 채움) -->
	<div class="map-area">
		<div id="map-container"></div>
		
		{{> map-toolbar}}
		{{> map-search-zoom}}
		{{> map-floating-controls}}
		{{> map-building-info}}
		{{> map-options}}

		<!-- 도유지 검색 플로트 -->
		<div class="map-ui-modal-backdrop lnd-stack is-open" id="govFloatStack" aria-hidden="true">
			<div class="lnd-rslt" id="govResultPanel">
				<header class="map-ui-modal__header lnd-rslt__hd">
					<h3><i class="menu_icon" aria-hidden="true"></i>도유지 검색 결과 목록</h3>
					<button type="button" class="lnd-rslt__fold" aria-expanded="true"></button>
				</header>
				<div class="lnd-rslt__body" id="govResultBody">
					<input type="search" class="map-ui-input lnd-rslt__q" id="govResultQuery" readonly value="경상북도 문경시 점촌동 123-4">
					<ol class="lnd-rslt__list" id="govResultList">
						<li><button type="button" class="lnd-rslt__item is-active"><span class="lnd-rslt__no">1</span> 경상북도 문경시 점촌동 123-4</button></li>
					</ol>
				</div>
			</div>
			<div class="map-ui-modal lnd-modal" id="govDetailModal">
				<header class="map-ui-modal__header">
					<h3>도유지 검색</h3>
					<button type="button" class="map-ui-modal__close" aria-label="닫기" data-land-search-close></button>
				</header>
				<div class="map-ui-modal__body">
					<div class="map-ui-modal__content lnd-dtl" data-land-search-detail>
						<p class="lnd-addr" data-land-search-address>경상북도 문경시 점촌동 123-4</p>
						<section class="lnd-sec">
							<h4 id="govHdrBasic" class="lnd-h">기본정보</h4>
							<div class="lnd-tbl">
								<div class="lnd-row">
									<div class="lnd-lbl">지목</div>
									<div class="lnd-val" data-land-jimok>대 (08)</div>
								</div>
								<div class="lnd-row">
									<div class="lnd-lbl">면적</div>
									<div class="lnd-val" data-land-area>345.2㎡</div>
								</div>
								<div class="lnd-row">
									<div class="lnd-lbl">소유구분</div>
									<div class="lnd-val" data-land-owner>사유지</div>
								</div>
								<div class="lnd-row">
									<div class="lnd-lbl">변동일자</div>
									<div class="lnd-val" data-land-changed>2021-05-12</div>
								</div>
								<div class="lnd-ctr" data-land-contract>
									<span class="lnd-ctr__lbl">계약 상태</span>
									<div class="lnd-ctr__body">
										<span class="lnd-ctr__main" data-land-contract-status>사용중</span>
										<span class="lnd-ctr__sub" data-land-contract-note>대부불가 (공용 사용중)</span>
									</div>
								</div>
							</div>
						</section>
					</div>
				</div>
			</div>
		</div>

	</div>
</div>
{{/layout}}
