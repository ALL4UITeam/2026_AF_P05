{{#> layout}}
<div class="vibe-container map-spatial-page">
	<aside class="map-search-sidebar map-spatial-sidebar is-open" id="spatialPanel">
    <div class="map-search-sidebar__inner">
      <header class="map-search-sidebar__header map-spatial-sidebar__header">
        <h2>경관 분석 &gt; 일조권 분석</h2>
        <button type="button" class="map-search-sidebar__close" data-target="spatialPanel" title="닫기">닫기</button>
      </header>

      <div class="map-search-sidebar__body map-spatial-sidebar__body">
        <div class="map-sidebar__notice">
          <div class="map-sidebar__notice-content">
            <strong>일조권</strong>
            <p>동지일을 기준으로 희망하는 분석시간 간격을 선택 후, 지도상에 지점을 선택하여 총 일조량과 연속일조량을 확인할 수 있습니다.
            </p>
          </div>
          <button type="button" class="btn-notice" aria-label="설명 보기">사용법 및 산출방식</button>
        </div>

        <div class="sidebar_divider"></div>

        <section class="map-spatial-sidebar__section">
          <div class="map-spatial-sun-controls">
            <div class="map-spatial-sun-controls__row">
              <label for="sunInterval" class="map-spatial-sun-controls__label">분석시간간격</label>
              <select class="map-ui-select map-spatial-sun-controls__select" id="sunInterval" title="분석시간간격">
                <option value="15" selected>15분</option>
                <option value="30">30분</option>
                <option value="60">60분</option>
              </select>
            </div>
            <div class="map-spatial-sun-controls__row">
              <span class="map-spatial-sun-controls__label">시간별 태양위치</span>
              <div class="map-spatial-sun-controls__time">
                <span>10:00</span>
                <input type="range" class="mydata-layer__range" min="0" max="24" value="10" aria-label="시간별 태양위치">
              </div>
            </div>
          </div>
        </section>

        <div class="sidebar__footer">
          <button type="button" class="sidebar__footer-btn map-spatial-sun-actions__btn map-spatial-sun-actions__btn--pick">지점선택</button>
          <button type="button" class="sidebar__footer-btn map-spatial-sun-actions__btn map-spatial-sun-actions__btn--reset">초기화</button>
        </div>
      </div>
    </div>
    <button type="button" class="map-search-sidebar__open" data-target="spatialPanel">열기</button>
  </aside>

	<div class="map-area">
		<div id="map-container"></div>
		{{> map-toolbar}}
	</div>

</div>
{{/layout}}
