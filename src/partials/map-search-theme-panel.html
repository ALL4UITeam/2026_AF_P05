<!-- 주제도: 탭(검색어로/분류별), 상단·총건수 고정, 목록만 스크롤 -->
<aside class="map-search-sidebar map-theme-sidebar" id="themePanel">
  <div class="map-search-sidebar__inner">
    <header class="map-search-sidebar__header">
      <h2>주제도</h2>
      <button type="button" class="map-theme-sidebar__info" aria-label="주제도 정보">i</button>
      <button type="button" title="닫기" class="map-search-sidebar__close" data-target="themePanel"
        aria-label="닫기">닫기</button>
    </header>
    <div class="map-search-sidebar__body map-theme-sidebar__body" data-theme-tabs>
      <nav class="map-theme-sidebar__tabs" role="tablist" aria-label="주제도 찾기">
        <button type="button" class="map-theme-sidebar__tab is-active" role="tab" aria-selected="true"
          aria-controls="theme-panel-search" id="theme-tab-search" data-theme-tab="search">검색어로 찾기</button>
        <button type="button" class="map-theme-sidebar__tab" role="tab" aria-selected="false"
          aria-controls="theme-panel-category" id="theme-tab-category" data-theme-tab="category">분류별 찾기</button>
      </nav>

      <!-- 검색어로 찾기 패널: 고정(검색+총건수+정렬+안내) + 스크롤(목록) -->
      <div class="map-theme-sidebar__panel" id="theme-panel-search" role="tabpanel" aria-labelledby="theme-tab-search"
        data-theme-panel="search">
        <div class="map-theme-sidebar__fixed">
          <div class="map-theme-sidebar__search-row">
            <input type="text" id="themeLayersKeyword" class="map-ui-input" placeholder="지도명 또는 제공처명 검색"
              aria-label="주제도 검색">
            <button type="button" class="map-theme-sidebar__search-btn" aria-label="검색">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
              </svg>
            </button>
            <button type="button" class="map-theme-sidebar__reset-btn" title="주제도 초기화" aria-label="초기화">초기화</button>
          </div>
          <div class="map-theme-sidebar__toolbar">
            <span class="map-ui-tree__count" aria-label="총 건수">총 <strong id="themeCount1">402</strong> 건</span>
            <label for="themeSortList" class="sr-only">정렬</label>
            <select id="themeSortList" class="map-ui-select map-theme-sidebar__sort" aria-label="정렬 순서">
              <option value="0">최근갱신순</option>
              <option value="2">갱신일역순</option>
              <option value="1">가나다순</option>
              <option value="3">하파타순</option>
            </select>
          </div>

        </div>
        <div class="map-theme-sidebar__scroll">

        </div>
      </div>

      <!-- 분류별 찾기 패널: 고정(총건수+모두열기) + 스크롤(트리) -->
      <div class="map-theme-sidebar__panel map-theme-sidebar__panel--hidden" id="theme-panel-category" role="tabpanel"
        aria-labelledby="theme-tab-category" data-theme-panel="category">
        <div class="map-theme-sidebar__fixed">
          <div class="map-theme-sidebar__toolbar">
            <span class="map-ui-tree__count" aria-label="총 건수">총 <strong id="themeCount2">402</strong> 건</span>
            <button type="button" class="map-ui-btn map-ui-btn--sm" data-tree-expand-all
              aria-label="모두 열기">모두열기</button>
          </div>
        </div>
        <div class="map-theme-sidebar__scroll" data-tree>

        </div>
      </div>
    </div>
  </div>
  <button type="button" class="map-search-sidebar__open" data-target="themePanel">열기</button>
</aside>
