<aside class="map-search-sidebar is-open" id="layerPanel">
  <div class="map-search-sidebar__inner">
    <header class="map-search-sidebar__header">
      <h2>3차원 가시화 <i class="info-icon" aria-label="3차원 가시화 정보"></i></h2>
      <button title="닫기" class="map-search-sidebar__close" data-target="layerPanel">
        닫기
      </button>
    </header>

    <div class="map-search-sidebar__body" data-tree>
      <div class="map-ui-tree__toolbar map-search-sidebar__top">
        <span class="map-ui-tree__count" aria-live="polite">총 <strong>402</strong> 건</span>
        <button type="button" class="map-search-sidebar__expand-all" data-tree-expand-all aria-label="모두 열기">모두 열기 <i class="icon-arrow"></i></button>
      </div>
      <ul class="map-ui-tree" role="tree">
        <li class="map-ui-tree__node map-ui-tree__node--root" role="treeitem" aria-expanded="true">
          <div class="map-ui-tree__item" data-tree-toggle>
            <label class="input-check">
              <input type="checkbox" data-parent data-children="terrain,realimg,building3d" data-tree-id="map3d" aria-label="3D지도">
              <span class="input-check__ui" aria-hidden="true"></span>
            </label>
            <span class="map-ui-tree__label">3D지도</span>
            <span class="map-ui-tree__caret map-ui-tree__caret--open" aria-hidden="true"></span>
          </div>
          <ul class="map-ui-tree__children" role="group">
            <li class="map-ui-tree__node" role="treeitem" aria-expanded="true">
              <div class="map-ui-tree__item" data-tree-toggle>
                <label class="input-check">
                  <input type="checkbox" data-parent data-children="aerial,dem" data-tree-id="terrain" aria-label="지형">
                  <span class="input-check__ui" aria-hidden="true"></span>
                </label>
                <span class="map-ui-tree__label">지형</span>
                <span class="map-ui-tree__caret map-ui-tree__caret--open" aria-hidden="true"></span>
              </div>
              <ul class="map-ui-tree__children" role="group">
                <li class="map-ui-tree__node" role="treeitem">
                  <div class="map-ui-tree__item">
                    <span class="map-ui-tree__spacer" aria-hidden="true"></span>
                    <label class="input-check">
                      <input type="checkbox" data-leaf data-tree-id="aerial" checked aria-label="항공영상">
                      <span class="input-check__ui" aria-hidden="true"></span>
                    </label>
                    <span class="map-ui-tree__label">항공영상</span>
                  </div>
                </li>
                <li class="map-ui-tree__node" role="treeitem">
                  <div class="map-ui-tree__item">
                    <span class="map-ui-tree__spacer" aria-hidden="true"></span>
                    <label class="input-check">
                      <input type="checkbox" data-leaf data-tree-id="dem" aria-label="수치표고모델(DEM)">
                      <span class="input-check__ui" aria-hidden="true"></span>
                    </label>
                    <span class="map-ui-tree__label">수치표고모델(DEM)</span>
                  </div>
                </li>
              </ul>
            </li>
            <li class="map-ui-tree__node" role="treeitem">
              <div class="map-ui-tree__item">
                <span class="map-ui-tree__spacer" aria-hidden="true"></span>
                <label class="input-check">
                  <input type="checkbox" data-leaf data-tree-id="realimg" aria-label="실감영상">
                  <span class="input-check__ui" aria-hidden="true"></span>
                </label>
                <span class="map-ui-tree__label">실감영상</span>
              </div>
            </li>
            <li class="map-ui-tree__node" role="treeitem" aria-expanded="true">
              <div class="map-ui-tree__item" data-tree-toggle>
                <label class="input-check">
                  <input type="checkbox" data-parent data-children="lod3,gyeongbuk" data-tree-id="building3d" aria-label="건물 3D">
                  <span class="input-check__ui" aria-hidden="true"></span>
                </label>
                <span class="map-ui-tree__label">건물 3D</span>
                <span class="map-ui-tree__caret map-ui-tree__caret--open" aria-hidden="true"></span>
              </div>
              <ul class="map-ui-tree__children" role="group">
                <li class="map-ui-tree__node" role="treeitem">
                  <div class="map-ui-tree__item">
                    <span class="map-ui-tree__spacer" aria-hidden="true"></span>
                    <label class="input-check">
                      <input type="checkbox" data-leaf data-tree-id="lod3" aria-label="브이월드 LOD3">
                      <span class="input-check__ui" aria-hidden="true"></span>
                    </label>
                    <span class="map-ui-tree__label">브이월드 LOD3</span>
                  </div>
                </li>
                <li class="map-ui-tree__node" role="treeitem">
                  <div class="map-ui-tree__item">
                    <span class="map-ui-tree__spacer" aria-hidden="true"></span>
                    <label class="input-check">
                      <input type="checkbox" data-leaf data-tree-id="gyeongbuk" checked aria-label="경북3D모델 서비스">
                      <span class="input-check__ui" aria-hidden="true"></span>
                    </label>
                    <span class="map-ui-tree__label">경북3D모델 서비스</span>
                  </div>
                </li>
              </ul>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</aside>
