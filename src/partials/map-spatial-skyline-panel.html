<!-- 스카이라인 분석 패널 (PPT slide 16) -->
<aside class="map-search-sidebar map-spatial-sidebar is-open" id="spatialSkylinePanel">
  <div class="map-search-sidebar__inner">
    <header class="map-search-sidebar__header map-spatial-sidebar__header">
      <h2>스카이라인 분석</h2>
      <button type="button" class="map-search-sidebar__close" data-target="spatialSkylinePanel" title="닫기">닫기</button>
    </header>

    <div class="map-search-sidebar__body map-spatial-sidebar__body">
      <p class="map-spatial-sidebar__notice">
        <i aria-hidden="true">i</i>
        <span>시점을 설정한 후 스카이라인을 확인할 수 있습니다.</span>
      </p>

      <section class="map-spatial-sidebar__section">
        <h3 class="map-spatial-sidebar__section-title">시점 설정</h3>
        <div class="map-spatial-point-pick">
          <span class="map-spatial-point-pick__label">시점</span>
          <button type="button" class="map-spatial-point-pick__btn">지도에서 선택</button>
        </div>
      </section>

      <section class="map-spatial-sidebar__section">
        <h3 class="map-spatial-sidebar__section-title">색상 지정</h3>
        <div class="map-spatial-sidebar__radius-box">
          <div class="map-spatial-stepper">
            <span class="map-spatial-stepper__label">카메라 / 절대고도</span>
            <div class="map-spatial-stepper__control">
              <button type="button" class="map-spatial-stepper__btn">−</button>
              <input type="number" class="map-spatial-stepper__input" value="10" min="0" aria-label="절대고도">
              <button type="button" class="map-spatial-stepper__btn">+</button>
              <span class="map-spatial-stepper__unit">m</span>
            </div>
          </div>
          <div style="margin-top:10px; display:flex; justify-content:flex-end;">
            <button type="button" class="map-spatial-sidebar__add-zone" style="width:auto; padding:0 16px; font-size:13px;">초기화</button>
          </div>
          <div class="map-spatial-color-row" style="margin-top:10px;">
            <span class="map-spatial-color-row__label">하늘</span>
            <button type="button" class="map-spatial-color-row__swatch" style="background:#bfdbfe;" aria-label="하늘 색상 선택"></button>
          </div>
          <div class="map-spatial-color-row" style="margin-top:8px;">
            <span class="map-spatial-color-row__label">지형 및 건물</span>
            <button type="button" class="map-spatial-color-row__swatch" style="background:#4b5563;" aria-label="지형 및 건물 색상 선택"></button>
          </div>
        </div>
      </section>

      <p class="map-spatial-map-hint">지도에 마우스로 시점 위치와 방향을 선택하세요</p>

      <div class="sidebar__footer">
        <button type="button" class="sidebar__footer-btn">취소</button>
        <button type="button" class="sidebar__footer-btn sidebar__footer-btn--primary">분석실행</button>
      </div>
    </div>
  </div>

  <button type="button" class="map-search-sidebar__open" data-target="spatialSkylinePanel">열기</button>
</aside>
