<div class="map-search-zoom" id="mapSearchZoom">
  <button type="button" class="map-search-zoom__plus" id="zoomPlus" aria-label="확대"></button>
  <div class="map-search-zoom__track-wrap">
    <div class="map-search-zoom__track" id="zoomTrack">
      <div class="map-search-zoom__fill" id="zoomFill" role="presentation"></div>
      <div class="map-search-zoom__handle" id="zoomHandle" role="slider" aria-valuemin="0" aria-valuemax="100"></div>
    </div>
  </div>
  <button type="button" class="map-search-zoom__minus" id="zoomMinus" aria-label="축소"></button>
</div>
