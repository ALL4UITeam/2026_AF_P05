<div class="map-options" id="mapDrawOptions" data-tool-type="draw" aria-hidden="true">
  <header class="map-options__header">
    <h3 class="map-options__title">도형 선택</h3>
    <div class="map-options__close">
      <button type="button" class="map-options__close-btn" data-tool-type="draw" aria-label="닫기">
        <span class="sr-only">닫기</span>
      </button>
    </div>
  </header>
  <div class="map-options__body">
    <div class="map-draw-options__buttons">
      <button type="button" class="map-draw-options__btn" data-draw="point">점 그리기</button>
      <button type="button" class="map-draw-options__btn" data-draw="line">선 그리기</button>
      <button type="button" class="map-draw-options__btn" data-draw="polygon">면 그리기</button>
    </div>
    <p class="map-draw-options__hint">도형 타입을 선택하세요.</p>
  </div>
</div>

<!-- 로드뷰: 툴바 로드뷰 클릭 시 전체 영역, 우측 70px·상단 20px 에 컨트롤 -->
<div class="map-roadview" id="mapRoadview" data-tool-type="roadview" aria-hidden="true">
  <div class="map-roadview__view" aria-hidden="true">
    
  </div>
  <div class="map-roadview__controls">
    <button type="button" class="map-roadview__btn map-roadview__btn--expand" aria-label="전체화면">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
    </button>
    <button type="button" class="map-options__close-btn map-roadview__btn map-roadview__btn--close" data-tool-type="roadview" aria-label="닫기">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
</div>


<!-- 배경지도: 툴바에서 열기. 2D/3D 탭, 탭별 옵션 목록 (일반·백지도·야간·영상 | 영상) -->
<div class="map-basemap" id="mapBasemap" data-basemap data-tool-type="basemap" aria-hidden="true">
  <nav class="map-basemap__tabs" role="tablist" aria-label="지도 모드">
    <button type="button" class="map-basemap__tab is-active" role="tab" aria-selected="true" aria-controls="map-basemap-panel-2d" id="map-basemap-tab-2d" data-basemap-tab="2d">2D</button>
    <button type="button" class="map-basemap__tab" role="tab" aria-selected="false" aria-controls="map-basemap-panel-3d" id="map-basemap-tab-3d" data-basemap-tab="3d">3D</button>
  </nav>
  <div class="map-basemap__panels">
    <div class="map-basemap__panel" id="map-basemap-panel-2d" role="tabpanel" aria-labelledby="map-basemap-tab-2d" data-basemap-panel="2d">
      <div class="map-basemap__options">
        <label class="map-basemap__option">
          <input type="radio" name="basemap2d" value="MAPW203" data-basemap-mode checked>
          <span class="map-basemap__label">일반</span>
        </label>
        <label class="map-basemap__option">
          <input type="radio" name="basemap2d" value="MAPW207" data-basemap-mode>
          <span class="map-basemap__label">백지도</span>
        </label>
        <label class="map-basemap__option">
          <input type="radio" name="basemap2d" value="MAPW205" data-basemap-mode>
          <span class="map-basemap__label">야간</span>
        </label>
        <label class="map-basemap__option">
          <input type="radio" name="basemap2d" value="MAPW206" data-basemap-mode>
          <span class="map-basemap__label">영상</span>
        </label>
      </div>
      <div class="map-basemap__vector">
        <label class="map-basemap__option">
          <input type="radio" name="basemapVector" value="raster" data-basemap-vector>
          <span class="map-basemap__label">기본</span>
        </label>
        <label class="map-basemap__option">
          <input type="radio" name="basemapVector" value="vector" data-basemap-vector checked>
          <span class="map-basemap__label">벡터</span>
        </label>
      </div>
    </div>
    <div class="map-basemap__panel map-basemap__panel--hidden" id="map-basemap-panel-3d" role="tabpanel" aria-labelledby="map-basemap-tab-3d" data-basemap-panel="3d" aria-hidden="true">
      <div class="map-basemap__options">
        <label class="map-basemap__option">
          <input type="radio" name="basemap3d" value="MAPW201" data-basemap-mode checked>
          <span class="map-basemap__label">영상</span>
        </label>
      </div>
    </div>
  </div>
  
</div>
