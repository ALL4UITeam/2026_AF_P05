
<div class="map-toolbar-wrap">
	<button type="button" class="map-toolbar__btn" data-tool="theme">
		<span class="map-toolbar__label">주제도</span>
	</button>
	
	<div class="map-toolbar" aria-label="지도 도구">
		<button type="button" class="map-toolbar__btn" data-tool="3d">
			<span class="map-toolbar__label">3D</span>
		</button>
		
		<button type="button" class="map-toolbar__btn" data-tool="distance">
			<span class="map-toolbar__label">거리</span>
		</button>
		<button type="button" class="map-toolbar__btn" data-tool="area">
			<span class="map-toolbar__label">면적</span>
		</button>
		<button type="button" class="map-toolbar__btn" data-tool="elevation">
			<span class="map-toolbar__label">표고</span>
		</button>
		<button type="button" class="map-toolbar__btn" data-tool="radius">
			<span class="map-toolbar__label">반경</span>
		</button>
		<button type="button" class="map-toolbar__btn" data-tool="draw">
			<span class="map-toolbar__label">그리기</span>
		</button>
		<button type="button" class="map-toolbar__btn" data-tool="print">
			<span class="map-toolbar__label">인쇄</span>
		</button>
		<button type="button" class="map-toolbar__btn" data-tool="save">
			<span class="map-toolbar__label">저장</span>
		</button>
		<button type="button" class="map-toolbar__btn" data-tool="roadview">
			<span class="map-toolbar__label">로드뷰</span>
		</button>
		<button type="button" class="map-toolbar__btn" data-tool="info">
			<span class="map-toolbar__label">정보보기</span>
		</button>
	</div>
</div>
