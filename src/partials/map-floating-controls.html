{{! 지도 우측 하단 원형 버튼 그룹: 정보, 새로고침, 되돌리기, 로드뷰/내위치, 나가기 }}
<div class="map-floating-controls is-open" aria-label="지도 컨트롤">
	<button type="button" class="map-floating-info-btn" data-control="info" aria-label="정보/도움말">
		
	</button>
	<button type="button" class="map-floating-refresh-btn" data-control="refresh" aria-label="새로고침">
		
	</button>
	<button type="button" class="map-floating-mode-btn" data-control="undo" aria-label="보행자모드">
		
	</button>
	<button type="button" class="map-floating-exit-btn" data-control="exit" aria-label="나가기">
		
	</button>
</div>

{{! 보행자모드 종료: 하단 50px, 좌우 가운데 }}
<div class="map-walkout is-open">
	<button type="button" class="map-walkout__btn" id="bt-walk-out" data-control="walk-out" aria-label="보행자모드 종료">보행자모드 종료</button>
</div>
