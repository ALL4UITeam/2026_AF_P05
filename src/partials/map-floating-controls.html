{{! 지도 우측 하단 원형 버튼 그룹: 정보, 새로고침, 되돌리기, 로드뷰/내위치, 나가기 }}
<div class="map-floating-controls" aria-label="지도 컨트롤">
	<button type="button" class="map-floating-controls__btn" data-control="info" aria-label="정보/도움말">
		<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
	</button>
	<button type="button" class="map-floating-controls__btn" data-control="refresh" aria-label="새로고침">
		<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
	</button>
	<button type="button" class="map-floating-controls__btn" data-control="undo" aria-label="되돌리기">
		<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 10h10a5 5 0 0 1 5 5v2"/><path d="M3 10l4-4M3 10l4 4"/></svg>
	</button>
	<button type="button" class="map-floating-controls__btn" data-control="user" aria-label="내 위치/로드뷰">
		<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>
	</button>
	<button type="button" class="map-floating-controls__btn" data-control="exit" aria-label="나가기">
		<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
	</button>
</div>

{{! 보행자모드 종료: 하단 50px, 좌우 가운데 }}
<div class="map-walkout">
	<button type="button" class="map-walkout__btn" id="bt-walk-out" data-control="walk-out" aria-label="보행자모드 종료">보행자모드 종료</button>
</div>
