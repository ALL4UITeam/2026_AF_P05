<article class="linkage-monitor__kpi linkage-monitor__kpi--{{variant}}" aria-label="{{label}}">
  <div class="linkage-monitor__kpi-header">
    <span class="linkage-monitor__kpi-icon-wrap" aria-hidden="true">
      <span class="linkage-monitor__kpi-icon"></span>
    </span>
    <span class="linkage-monitor__kpi-label">{{label}}</span>
  </div>
  <p class="linkage-monitor__kpi-value">{{value}}</p>
</article>
