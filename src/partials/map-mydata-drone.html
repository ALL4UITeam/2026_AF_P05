<aside class="map-search-sidebar" id="dronePanel">
  <div class="map-search-sidebar__inner">
    <header class="map-search-sidebar__header">
      <h2>드론영상</h2>
      <button title="닫기" class="map-search-sidebar__close" data-target="dronePanel">
        닫기
      </button>
    </header>

    <div class="map-search-sidebar__body">
      <div class="mydata-panel">
        <div class="drone-filter">
          <div class="drone-filter__group">
            <label class="drone-filter__label">프로젝트명</label>
            <div class="drone-filter__input-wrap">
              <input type="text" class="drone-filter__input" placeholder="검색어 입력">
            </div>
          </div>

          <div class="drone-filter__group">
            <label class="drone-filter__label">촬영지역</label>
            <div class="drone-filter__select-wrap">
              <select class="drone-filter__select">
                <option value="">전체</option>
                <option value="gyeongbuk">경상북도</option>
                <option value="daegu">대구광역시</option>
                <option value="pohang">포항시</option>
              </select>
            </div>
          </div>

          <div class="drone-filter__group">
            <label class="drone-filter__label">촬영기간</label>
            <div class="drone-filter__date-wrap">
              <div class="drone-filter__date">
                <input type="date" class="drone-filter__date-input" value="2026-01-01">
              </div>
              <div class="drone-filter__date">
                <input type="date" class="drone-filter__date-input" value="2026-02-01">
              </div>
            </div>
          </div>

          <div class="drone-filter__group">
            <label class="drone-filter__label">진행상태</label>
            <div class="drone-filter__radio-wrap">
              <label class="drone-filter__radio">
                <input type="radio" name="droneStatus" value="all" checked>
                <span>전체</span>
              </label>
              <label class="drone-filter__radio">
                <input type="radio" name="droneStatus" value="processing">
                <span>처리중</span>
              </label>
              <label class="drone-filter__radio">
                <input type="radio" name="droneStatus" value="done">
                <span>처리완료</span>
              </label>
              <label class="drone-filter__radio">
                <input type="radio" name="droneStatus" value="waiting">
                <span>대기</span>
              </label>
            </div>
          </div>
        </div>
        <div class="mydata-panel__footer">
          <button type="button" class="mydata-panel__btn">조회하기</button>
        </div>
      </div>
    </div>
  </div>
</aside>
