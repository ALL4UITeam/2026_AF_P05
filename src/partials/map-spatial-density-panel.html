<!-- 밀도 분석 패널 (PPT slide 4) -->
<aside class="map-search-sidebar map-spatial-sidebar is-open" id="spatialDensityPanel">
  <div class="map-search-sidebar__inner">
    <header class="map-search-sidebar__header map-spatial-sidebar__header">
      <h2>밀도 분석</h2>
      <button type="button" class="map-search-sidebar__close" data-target="spatialDensityPanel" title="닫기">닫기</button>
    </header>

    <div class="map-search-sidebar__body map-spatial-sidebar__body">
      <p class="map-spatial-sidebar__notice">
        <i aria-hidden="true">i</i>
        <span>레이어와 속성을 설정하여 형식지 밀집 분포를 분석합니다.</span>
      </p>

      <section class="map-spatial-sidebar__section">
        <h3 class="map-spatial-sidebar__section-title">1. 레이어 설정</h3>
        <select class="map-ui-select" id="densityLayer" title="레이어 선택">
          <option value="">레이어를 선택하세요.</option>
          <option value="building">건물</option>
          <option value="land">토지</option>
          <option value="road">도로</option>
        </select>
      </section>

      <section class="map-spatial-sidebar__section">
        <h3 class="map-spatial-sidebar__section-title">2. 속성 설정</h3>
        <select class="map-ui-select" id="densityAttr" title="속성 선택">
          <option value="">속성을 선택하세요.</option>
        </select>
      </section>

      <div class="sidebar__footer">
        <button type="button" class="sidebar__footer-btn sidebar__footer-btn--primary">실행 (Run)</button>
      </div>
    </div>
  </div>

  <button type="button" class="map-search-sidebar__open" data-target="spatialDensityPanel">열기</button>
</aside>
