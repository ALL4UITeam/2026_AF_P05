<aside class="map-search-sidebar is-open" id="userPanel">
  <div class="map-search-sidebar__inner">
    <header class="map-search-sidebar__header">
      <h2>사용자 데이터</h2>
      <button title="닫기" class="map-search-sidebar__close" data-target="userPanel">
        닫기
      </button>
    </header>

    <div class="map-search-sidebar__body">
      <div class="mydata-panel">
        <button type="button" class="search-sidebar__primary" data-mydata-open>
          <i class="plus_icon"></i>사용자 데이터 등록
        </button>

        <div class="map-sidebar__location-input">
          <input type="search" id="locationSearchInput" class="map-ui-input input-search" placeholder="주소 또는 장소 검색" autocomplete="off">
          <button type="button" class="map-sidebar__search-btn" id="locationSearchBtn" aria-label="검색">검색</button>
        </div>

        <div class="sidebar_divider"></div>

        <div class="map-sidebar__content">
          <div class="mydata-panel__section">
            <div class="mydata-panel__section-title">
              등록된 레이어 <span class="mydata-panel__count">(4)</span>
            </div>
  
            <ul class="mydata-layer-list" data-mydata-layers>
              <li class="mydata-layer is-checked" data-layer>
                <div class="mydata-layer__row">
                  <label class="input-check">
                    <input type="checkbox" checked data-layer-check>
                    <span class="input-check__ui" aria-hidden="true"></span>
                  </label>
                  <div class="mydata-layer__name" title="사업지구_경계.shp">사업지구_경계.shp</div>
                  <div class="mydata-layer__actions">
                    <button type="button" class="icon--setting" aria-label="설정"></button>
                    <button type="button" class="icon--more" aria-label="공유"></button>
                    <button type="button" class="icon--del" aria-label="삭제"></button>
                  </div>
                </div>
                <div class="mydata-layer__controls">
                  <div class="mydata-layer__opacity">
                    <span class="mydata-layer__opacity-label">투명도</span>
                    <input type="range" min="0" max="100" value="60" class="map-ui-range" data-layer-opacity>
                  </div>
                  <div class="mydata-layer__badges">
                    <span class="layer__badge layer__badge--layer"><i class="badge-icon"></i>1</span>
                    <span class="layer__badge layer__badge--user"><i class="badge-icon"></i>1</span>
                  </div>
                </div>
              </li>
  
              <li class="mydata-layer is-checked" data-layer>
                <div class="mydata-layer__row">
                  <label class="input-check">
                    <input type="checkbox" checked data-layer-check>
                    <span class="input-check__ui" aria-hidden="true"></span>
                  </label>
                  <div class="mydata-layer__name" title="CCTV설치위치.csv">CCTV설치위치.csv</div>
                  <div class="mydata-layer__actions">
                    <button type="button" class="icon--more" aria-label="공유"></button>
                    <button type="button" class="icon--setting" aria-label="설정"></button>
                    <button type="button" class="icon--del" aria-label="삭제" data-layer-delete></button>
                  </div>
                </div>
                <div class="mydata-layer__controls">
                  <div class="mydata-layer__opacity">
                    <span class="mydata-layer__opacity-label">투명도</span>
                    <input type="range" min="0" max="100" value="45" class="map-ui-range" data-layer-opacity>
                  </div>
                  <div class="mydata-layer__badges">
                    <span class="layer__badge layer__badge--user"><i class="badge-icon"></i>1</span>
                  </div>
                </div>
              </li>
  
              <li class="mydata-layer" data-layer>
                <div class="mydata-layer__row">
                  <label class="input-check">
                    <input type="checkbox" data-layer-check>
                    <span class="input-check__ui" aria-hidden="true"></span>
                  </label>
                  <div class="mydata-layer__name" title="드론영상_2025.tif">드론영상_2025.tif</div>
                  <div class="mydata-layer__actions">
                    <button type="button" class="icon--more" aria-label="공유"></button>
                    <button type="button" class="icon--setting" aria-label="설정"></button>
                    <button type="button" class="icon--del" aria-label="삭제" data-layer-delete></button>
                  </div>
                </div>
                <div class="mydata-layer__controls">
                  <div class="mydata-layer__opacity">
                    <span class="mydata-layer__opacity-label">투명도</span>
                    <input type="range" min="0" max="100" value="30" class="map-ui-range" data-layer-opacity disabled>
                  </div>
                  <div class="mydata-layer__badges">
                    
                  </div>
                </div>
              </li>
            </ul>
          </div>
        </div>

        <div class="sidebar__footer">
          <button type="button" class="sidebar__footer-btn sidebar__footer-btn--primary">레이어 다운로드</button>
          <button type="button" class="sidebar__footer-btn">사용자 주제도 저장</button>
        </div>
      </div>
    </div>
  </div>
</aside>
