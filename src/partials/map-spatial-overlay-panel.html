<!-- 레이어 중첩 분석 패널 (PPT slide 6) -->
<aside class="map-search-sidebar map-spatial-sidebar is-open" id="spatialOverlayPanel">
  <div class="map-search-sidebar__inner">
    <header class="map-search-sidebar__header map-spatial-sidebar__header">
      <h2>레이어 중첩 분석</h2>
      <button type="button" class="map-search-sidebar__close" data-target="spatialOverlayPanel" title="닫기">닫기</button>
    </header>

    <div class="map-search-sidebar__body map-spatial-sidebar__body">
      <p class="map-spatial-sidebar__notice">
        <i aria-hidden="true">i</i>
        <span>분석 대상 레이어와 비교 대상 레이어를 설정하고, 공간연산 방식을 선택하세요.</span>
      </p>

      <section class="map-spatial-sidebar__section">
        <h3 class="map-spatial-sidebar__section-title">1. 분석 대상 레이어 설정</h3>
        <select class="map-ui-select" id="overlayTargetLayer" title="분석 대상 레이어">
          <option value="">분석 대상 레이어를 선택하세요.</option>
          <option value="building">건물</option>
          <option value="land">토지</option>
        </select>
      </section>

      <section class="map-spatial-sidebar__section">
        <h3 class="map-spatial-sidebar__section-title">2. 비교 대상 레이어 설정</h3>
        <select class="map-ui-select" id="overlayCompareLayer" title="비교 대상 레이어">
          <option value="">비교 대상 레이어를 선택하세요.</option>
          <option value="building">건물</option>
          <option value="land">토지</option>
        </select>
      </section>

      <section class="map-spatial-sidebar__section">
        <h3 class="map-spatial-sidebar__section-title">3. 사용자 도형 설정</h3>
        <button type="button" class="map-spatial-sidebar__anchor-btn" style="height:52px; font-size:14px;">
          지도에서 도형을 직접 그리세요
        </button>
        <button type="button" class="map-spatial-sidebar__add-zone" style="font-size:14px;">+ 직접 추가</button>
      </section>

      <section class="map-spatial-sidebar__section">
        <h3 class="map-spatial-sidebar__section-title">4. 행정구역 설정</h3>
        <select class="map-ui-select" id="overlaySigungu" title="행정구역">
          <option value="">행정구역을 선택하세요.</option>
        </select>
      </section>

      <section class="map-spatial-sidebar__section">
        <h3 class="map-spatial-sidebar__section-title">5. 공간연산 설정</h3>
        <div class="map-spatial-layer-add">
          <select class="map-ui-select" id="overlayOperation" title="공간연산">
            <option value="">공간연산을 선택하세요.</option>
            <option value="intersect">교집합 (Intersect)</option>
            <option value="union">합집합 (Union)</option>
            <option value="difference">차집합 (Difference)</option>
            <option value="clip">자르기 (Clip)</option>
          </select>
          <button type="button" class="map-spatial-layer-add__btn">+ 추가</button>
        </div>
      </section>

      <div class="sidebar__footer">
        <button type="button" class="sidebar__footer-btn">초기화</button>
        <button type="button" class="sidebar__footer-btn sidebar__footer-btn--primary">실행 (Run)</button>
      </div>
    </div>
  </div>

  <button type="button" class="map-search-sidebar__open" data-target="spatialOverlayPanel">열기</button>
</aside>
