<!-- 좌측 사이드바: VWorld dtkmap 스타일 (고정 폭, 회색 배경) -->
<aside class="map-search-sidebar is-open" id="locationSearchPanel">
  <div class="map-search-sidebar__inner">
    <header class="map-search-sidebar__header">
      <h2>위치 검색</h2>
      <button title="닫기" class="map-search-sidebar__close" data-target="locationSearchPanel">닫기</button>
    </header>
    <div class="map-search-sidebar__body">
      <div class="sidebar__search">
        <div class="sidebar__search-location">
          <div class="map-ui-form-group">
            <label for="searchSigungu">시군</label>
            <select id="searchSigungu" class="map-ui-select">
              <option value="">전체</option>
              <option value="andong">안동시</option>
              <option value="yeongyang">영양군</option>
              <option value="yeongju">영주시</option>
              <option value="gyeongsan">경산시</option>
            </select>
          </div>
          <div class="map-ui-form-group">
            <label for="searchEmd">읍면동</label>
            <select id="searchEmd" class="map-ui-select">
              <option value="">전체</option>
            </select>
          </div>
          <div class="map-ui-form-group">
            <label for="searchRi">리</label>
            <select id="searchRi" class="map-ui-select">
              <option value="">전체</option>
            </select>
          </div>
        </div>
        <div class="map-sidebar__location-input">
          <input type="text" class="map-ui-input input-search" placeholder="주소 입력">
          <button type="button" class="map-sidebar__search-btn">검색</button>
        </div>
      </div>
    </div>
  </div>
  <!-- <button type="button" class="map-search-sidebar__open" data-target="locationSearchPanel">
    열기
  </button> -->
</aside>
