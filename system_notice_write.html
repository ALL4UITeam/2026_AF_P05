{{#> layout3}}

<div class="cont-box-wrap">
  <div class="cont-box write-form">
    <div class="tit-wrap">
      <h2>공지사항 등록</h2>
    </div>
    <p class="write-form__guide">제목과 내용을 입력한 뒤 저장 버튼을 눌러 공지사항을 등록해 주세요.</p>

    <div class="tbl-wrap write-form__table">
      <table class="tbl">
        <colgroup>
          <col style="width:180px;">
          <col style="width:auto;">
        </colgroup>
        <tbody>
          <tr>
            <th>제목</th>
            <td><input type="text" class="type01" placeholder="제목을 입력하세요."></td>
          </tr>
          <tr>
            <th>카테고리</th>
            <td>
              <select class="type01">
                <option>점검안내</option>
                <option>업데이트</option>
                <option>정책공지</option>
              </select>
            </td>
          </tr>
          <tr>
            <th>고정 공지</th>
            <td>
              <label class="write-form__check"><input type="checkbox"> 상단 고정</label>
            </td>
          </tr>
          <tr>
            <th>내용</th>
            <td><textarea class="type01" placeholder="내용을 입력하세요."></textarea></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="form-wrap write-form__actions">
      <a href="/system_notice_list.html" class="com-btn blue w200">목록</a>
      <button type="button" class="com-btn blue w200">저장</button>
    </div>
  </div>
</div>

{{/layout3}}
